function storageMeterHTML(){
  const s = storageInfo();
  const pctTxt = Math.round(s.pct*100);
  const budgetTxt = s.budgetMB>=1024 ? (s.budgetMB/1024).toFixed(1)+' GB' : s.budgetMB+' MB';
  return `<div class="storage-meter ${s.near?'near':''}">
    <div class="sm-row"><span class="sm-label">Storage (IndexedDB)</span><span class="sm-val">${s.usedMB} MB of ~${budgetTxt} · ${pctTxt}%</span></div>
    <div class="sm-track"><div class="sm-fill" style="width:${Math.max(2,pctTxt)}%"></div></div>
    <div class="sm-note">Photos are stored in the browser's local database for this site. They stay on this device/browser only — export a JSON backup to keep or move them.</div>
    ${s.near?`<div class="sm-warn">⚠ Getting full — export a backup and trim photo-heavy entries.</div>`:''}
  </div>`;
}
function bindSettings(){
  const p=document.getElementById('panel');
  const refresh=()=>{ p.querySelector('.panel-body').innerHTML=settingsBodyHTML(); bindSettings(); };
  p.querySelectorAll('[data-set-theme]').forEach(b=>b.onclick=()=>{ setTheme(b.dataset.setTheme); refresh(); });
  p.querySelectorAll('[data-set-font]').forEach(b=>b.onclick=()=>{ setFont(b.dataset.setFont); refresh(); });
  p.querySelectorAll('[data-size]').forEach(b=>b.onclick=()=>{
    const a=b.dataset.size;
    if(a==='up') bumpScale(1);
    else if(a==='down') bumpScale(-1);
    else if(a==='reset') setScale(1);
    refresh();
  });
  p.querySelectorAll('[data-catidx]').forEach(inp=>inp.onchange=()=>{ if(!requireMaster())return; state.categories[+inp.dataset.catidx]=inp.value.trim()||state.categories[+inp.dataset.catidx]; save(); });
  p.querySelectorAll('[data-rmcat]').forEach(b=>b.onclick=()=>{ if(!requireMaster())return; const i=+b.dataset.rmcat; if(confirm('Remove category "'+state.categories[i]+'"?')){ state.categories.splice(i,1); save(); p.querySelector('.panel-body').innerHTML=settingsBodyHTML(); bindSettings(); } });
  p.querySelectorAll('[data-rmtpl]').forEach(b=>b.onclick=()=>{ if(b.disabled)return; if(!requireMaster())return; const i=+b.dataset.rmtpl; if(confirm('Delete template?')){ state.templates.splice(i,1); save(); p.querySelector('.panel-body').innerHTML=settingsBodyHTML(); bindSettings(); } });
  p.querySelector('.panel-body').querySelectorAll('[data-act]').forEach(b=>{
    b.onclick=()=>{
      const a=b.dataset.act;
      if(a==='addCat'){ const v=p.querySelector('#newCat').value.trim(); if(v&&!state.categories.includes(v)){ state.categories.push(v); save(); p.querySelector('.panel-body').innerHTML=settingsBodyHTML(); bindSettings(); } }
      else if(a==='newTemplate') newTemplate();
      else if(a==='exportJson') exportJson();
      else if(a==='exportCsv') exportCsv();
      else if(a==='import') importData();
    };
  });
}
function newTemplate(){
  openModal(`
    <div class="sheet-head"><h2>New template</h2><button class="close" data-x>✕</button></div>
    <div class="sheet-body">
      <div class="field"><label>Template title</label><input id="tName" placeholder="e.g. Bunkering Record"></div>
      <div class="field"><label>Default entry title</label><input id="tTitle" placeholder="Pre-filled title"></div>
      <div class="field"><label>Default description</label><textarea id="tDesc" placeholder="Pre-filled description…"></textarea></div>
      <div class="field-2">
        <div class="field"><label>Category</label><select id="tCat">${state.categories.map(c=>`<option>${esc(c)}</option>`).join('')}</select></div>
        <div class="field"><label>Priority</label><select id="tPrio"><option>Low</option><option selected>Medium</option><option>High</option></select></div>
      </div>
      <div class="field"><label>Default status</label><select id="tStatus"><option value="">— none —</option>${['Open','In Progress','Closed','Just a Log'].map(s=>`<option>${s}</option>`).join('')}</select></div>
      <button class="save-btn" id="tSave">Save template</button>
    </div>`);
  const ov=document.getElementById('overlay');
  ov.querySelector('[data-x]').onclick=()=>{ closeModal(); openSettings(); };
  ov.querySelector('#tSave').onclick=()=>{
    const name=ov.querySelector('#tName').value.trim();
    if(!name){ toast('Template title required'); return; }
    state.templates.push({
      title: ov.querySelector('#tTitle').value.trim()||name,
      description: ov.querySelector('#tDesc').value.trim(),
      category: ov.querySelector('#tCat').value,
      priority: ov.querySelector('#tPrio').value,
      status: ov.querySelector('#tStatus').value
    });
    save(); closeModal(); openSettings(); toast('Template saved');
  };
}

/* ============ REPORTS ============ */
function openReport(){
  let repStatus='All', repCat='All', repType='summary', repTs=false, selected=new Set(liveEntries().map(e=>e.id));
  openPanel('Generate report', reportBody(), '');
  const p=document.getElementById('panel');
  function reportBody(){
    const cats=['All',...state.categories];
    let pool=liveEntries().filter(e=>(repStatus==='All'||e.status===repStatus)&&(repCat==='All'||e.category===repCat));
    return `
      <div class="field"><label>Report type</label>
        <div class="seg" id="repType">
          <button data-v="summary" class="${repType==='summary'?'on':''}" style="${repType==='summary'?'background:var(--accent);border-color:var(--accent);color:#fff':''}">Summary table</button>
          <button data-v="detail" class="${repType==='detail'?'on':''}" style="${repType==='detail'?'background:var(--accent);border-color:var(--accent);color:#fff':''}">Individual detail</button>
        </div></div>
      <div class="field-2">
        <div class="field"><label>Status</label><select id="repStatus">${['All','Open','In Progress','Closed','Just a Log'].map(s=>`<option ${repStatus===s?'selected':''}>${s}</option>`).join('')}</select></div>
        <div class="field"><label>Category</label><select id="repCat">${cats.map(c=>`<option ${repCat===c?'selected':''}>${esc(c)}</option>`).join('')}</select></div>
      </div>
      <div class="field"><label><input type="checkbox" id="repTs" ${repTs?'checked':''}> Include timestamp column</label></div>
      <div class="field"><label>Entries (${selected.size} selected)</label>
        <div style="display:flex;gap:8px;margin-bottom:8px;">
          <button class="fbtn" id="selAll">Select all</button><button class="fbtn" id="selNone">None</button>
        </div>
        <div style="max-height:300px;overflow-y:auto;display:flex;flex-direction:column;gap:6px;">
          ${pool.map(e=>`<label class="cat-item"><input type="checkbox" data-selid="${e.id}" ${selected.has(e.id)?'checked':''}><span style="flex:1">${esc(e.title)}</span><span style="font-size:10px;color:var(--text-faint)">${esc(e.id)}</span></label>`).join('')||'<div class="locked-msg">No entries match</div>'}
        </div>
      </div>
      <button class="save-btn" id="repGen">⎙ Generate report</button>`;
  }
  function rebind(){
    p.querySelector('.panel-body').innerHTML=reportBody();
    p.querySelectorAll('#repType button').forEach(b=>b.onclick=()=>{ repType=b.dataset.v; rebind(); });
    p.querySelector('#repStatus').onchange=e=>{ repStatus=e.target.value; selected=new Set(liveEntries().filter(x=>(repStatus==='All'||x.status===repStatus)&&(repCat==='All'||x.category===repCat)).map(x=>x.id)); rebind(); };
    p.querySelector('#repCat').onchange=e=>{ repCat=e.target.value; selected=new Set(liveEntries().filter(x=>(repStatus==='All'||x.status===repStatus)&&(repCat==='All'||x.category===repCat)).map(x=>x.id)); rebind(); };
    p.querySelector('#repTs').onchange=e=>repTs=e.target.checked;
    p.querySelector('#selAll').onclick=()=>{ liveEntries().filter(x=>(repStatus==='All'||x.status===repStatus)&&(repCat==='All'||x.category===repCat)).forEach(x=>selected.add(x.id)); rebind(); };
    p.querySelector('#selNone').onclick=()=>{ selected.clear(); rebind(); };
    p.querySelectorAll('[data-selid]').forEach(cb=>cb.onchange=()=>{ if(cb.checked)selected.add(cb.dataset.selid); else selected.delete(cb.dataset.selid); });
    p.querySelector('#repGen').onclick=()=>{
      const sel=liveEntries().filter(e=>selected.has(e.id));
      if(!sel.length){ toast('Select at least one entry'); return; }
      buildReport(sel, repType, repTs, `Filter: ${repStatus} · ${repCat}`);
    };
  }
  rebind();
}

function buildReport(entries, type, includeTs, subtitle){
  const css=`<style>
    @page{margin:14mm;}
    *{box-sizing:border-box;font-family:'Segoe UI',Arial,sans-serif;}
    body{color:#1a2029;margin:0;}
    h1{font-size:22px;margin:0 0 4px;}
    .sub{color:#666;font-size:12px;margin-bottom:18px;}
    table{width:100%;border-collapse:collapse;font-size:12px;}
    th{background:#1a2029;color:#fff;text-align:left;padding:8px 10px;}
    td{padding:7px 10px;border-bottom:1px solid #ddd;vertical-align:top;}
    .pill{display:inline-block;padding:2px 8px;border-radius:10px;color:#fff;font-size:10px;}
    .entry{page-break-inside:avoid;margin-bottom:26px;border:1px solid #ddd;border-radius:8px;padding:16px;}
    .entry h2{font-size:17px;margin:0 0 8px;}
    .badges{margin-bottom:10px;}
    .meta{font-size:11px;color:#555;margin-bottom:10px;}
    .ts{font-weight:bold;font-size:11px;line-height:1.4;}
    .photos{display:flex;flex-wrap:wrap;gap:10px;margin:10px 0;}
    .photos img{max-width:320px;max-height:320px;width:auto;height:auto;object-fit:contain;border-radius:6px;border:1px solid #ddd;}
    .upd{border-left:3px solid #5b8def;padding:4px 0 4px 12px;margin:8px 0;}
    .desc{font-size:13px;white-space:pre-wrap;margin-bottom:8px;}
  </style>`;
  const SC={'Open':'#d63838','In Progress':'#c47d10','Closed':'#2a9b3e','Just a Log':'#8250df'};
  let html='';
  if(type==='summary'){
    html=`<table><thead><tr>
      <th>ID</th><th>Title</th><th>Status</th><th>Priority</th><th>Category</th>${includeTs?'<th>Created</th>':''}
    </tr></thead><tbody>
      ${entries.map(e=>`<tr>
        <td>${esc(e.id)}</td><td>${esc(e.title)}</td>
        <td><span class="pill" style="background:${SC[e.status]}">${e.status}</span></td>
        <td>${e.priority}</td><td>${esc(e.category)}</td>
        ${includeTs?`<td>${fmtTime(e.createdMs)}</td>`:''}
      </tr>`).join('')}
    </tbody></table>`;
  } else {
    html=entries.map(e=>{
      const photos=e.attachments.filter(a=>a.type==='photo');
      const log=combinedLog(e);
      return `<div class="entry">
        <h2>${esc(e.title)} <span style="font-size:12px;color:#999;font-weight:normal">${esc(e.id)}</span></h2>
        <div class="badges">
          <span class="pill" style="background:${SC[e.status]}">${e.status}</span>
          <span class="pill" style="background:#5b8def">${e.priority}</span>
          <span class="pill" style="background:#444">${esc(e.category)}</span>
        </div>
        <div class="meta">${includeTs?'Created: '+fmtTime(e.createdMs):''}</div>
        ${photos.length?`<div class="photos">${photos.map(a=>`<img src="${a.full||a.thumb}">`).join('')}</div>`:''}
        ${log.length?`<div style="font-size:11px;font-weight:bold;color:#888;margin:12px 0 6px;text-transform:uppercase;">Follow-up log</div>
          <table style="width:100%;border-collapse:collapse;font-size:12px;border:1px solid #ddd;">
            <thead><tr><th style="background:#1a2029;color:#fff;text-align:left;padding:6px 10px;width:150px;">Date · Day · Time</th><th style="background:#1a2029;color:#fff;text-align:left;padding:6px 10px;">Description</th></tr></thead>
            <tbody>${log.map(u=>{
              const ph=(u.attachments||[]).filter(a=>a.type==='photo');
              return `<tr><td style="padding:8px 10px;border-top:1px solid #ddd;border-right:1px solid #ddd;font-weight:bold;vertical-align:top;white-space:nowrap;">${fmtTwoLine(u.ms)}</td><td style="padding:8px 10px;border-top:1px solid #ddd;vertical-align:top;white-space:pre-wrap;">${esc(u.text)}${ph.length?`<div class="photos">${ph.map(a=>`<img src="${a.full||a.thumb}">`).join('')}</div>`:''}</td></tr>`;
            }).join('')}</tbody>
          </table>`:''}
      </div>`;
    }).join('');
  }
  const doc=`<!DOCTYPE html><html><head><meta charset="utf-8"><title>${esc(state.logName)} report</title>${css}</head>
    <body><h1>${esc(state.logName)}</h1><div class="sub">${esc(subtitle||'')} · ${entries.length} entr${entries.length===1?'y':'ies'} · Generated ${fmtTime(Date.now())}</div>${html}
    <script>window.onload=function(){setTimeout(function(){window.print();},300);}<\/script></body></html>`;
  if(IS_DESK){deskPrint(doc,false);return;}
  const blob=new Blob([doc],{type:'text/html'});
  const url=URL.createObjectURL(blob);
  window.open(url,'_blank');
}

function printEntry(id){ buildReport([getEntry(id)], 'detail', true, 'Single entry'); }

/* ============ TRASH ============ */
function deletedEntries(){ return state.entries.filter(e=>e.deleted).sort((a,b)=>(b.deletedAt||0)-(a.deletedAt||0)); }
function openTrash(){ openPanel('Trash', trashBodyHTML(), ''); bindTrash(); }
function trashBodyHTML(){
  const list=deletedEntries();
  if(!list.length) return '<div style="color:var(--text-dim);padding:14px">Trash is empty. Deleted entries are kept here so deletions sync across devices, and never appear in your log or reports.</div>';
  let h='<div style="color:var(--text-dim);font-size:calc(12px*var(--font-scale));margin-bottom:10px">Restore an entry, or empty the bin permanently. Trashed items never show in the log or reports.</div>';
  h+='<div class="menu-list">';
  list.forEach(e=>{
    h+=`<div style="display:flex;align-items:center;gap:10px;padding:10px 4px;border-bottom:1px solid var(--border-soft)">
      <div style="flex:1;min-width:0">
        <div style="font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(e.title||'(untitled)')}</div>
        <div style="font-size:calc(11px*var(--font-scale));color:var(--text-dim)">${esc(e.id)} · ${esc(e.category||'')} · deleted ${e.deletedAt?fmtTime(e.deletedAt):''}</div>
      </div>
      <button class="au-save" data-trestore="${esc(e.id)}">♻ Restore</button>
    </div>`;
  });
  h+='</div>';
  h+=`<button class="del" data-tempty style="margin-top:14px;${master?'':'display:none'}">🗑 Empty bin permanently</button>`;
  return h;
}
function bindTrash(){
  document.querySelectorAll('[data-trestore]').forEach(b=>b.addEventListener('click',()=>{
    const e=getEntry(b.dataset.trestore); if(!e)return;
    e.deleted=false; e.deletedAt=null; e.modified=Date.now(); state.dataVersion=(state.dataVersion||1)+1;
    save(); render(); openTrash(); toast('Entry restored');
  }));
  const emp=document.querySelector('[data-tempty]');
  if(emp) emp.addEventListener('click',()=>{
    if(!master){ toast('Master Mode required'); return; }
    const n=deletedEntries().length; if(!n){ toast('Trash already empty'); return; }
    if(!confirm('Permanently remove '+n+' trashed entr'+(n>1?'ies':'y')+'? This cannot be undone, and these deletions will no longer sync to other devices — make sure other devices have already received them.')) return;
    state.entries=state.entries.filter(e=>!e.deleted);
    state.dataVersion=(state.dataVersion||1)+1;
    save(); render(); openTrash(); toast('Trash emptied');
  });
}
function renderTrash(){ const p=document.getElementById('panel'); if(p && p.classList.contains('on')) { /* refresh if open */ } }

/* ============ SUITE BRIDGE — Ship Suite master backup/restore ============ */
window.SUITE = {
  async export(){
    return JSON.parse(JSON.stringify(state));
  },
  async importMerge(data){
    const rep=mergeOptData(normalizeIncoming(data||{}));
    if(!rep) return null;
    save(); render();
    return rep;
  },
  async size(){
    // wait until persisted data has loaded from IndexedDB so we don't report the empty default
    if(!window.__appLoaded){ await new Promise(r=>{ window.__onAppLoaded=r; setTimeout(r,6000); }); }
    let bytes=0; try{ bytes=new Blob([JSON.stringify(state)]).size; }catch(e){ bytes=JSON.stringify(state).length; }
    const live=(state.entries||[]).filter(e=>!e.deleted).length;
    return { bytes:bytes, records:live };
  }
};

/* ============ EXPORTS ============ */
function download(name, content, mime){
  if(IS_DESK){
    DESK.export_text(name,typeof content==='string'?content:String(content)).then(r=>{
      if(r&&r.ok)toast('Saved: '+r.path);
      else if(r&&r.error!=='cancelled')toast('Export failed');
    });
    state.lastExport=new Date().toISOString(); save();
    return;
  }
  const blob=new Blob([content],{type:mime});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a'); a.href=url; a.download=name; a.click();
  setTimeout(()=>URL.revokeObjectURL(url),1000);
  state.lastExport=new Date().toISOString(); save();
}
function exportJson(){
  download(`${state.logName.replace(/\s+/g,'_')}_backup_${dateStamp()}.json`, JSON.stringify(state,null,2), 'application/json');
  toast('JSON exported');
}
function exportCsv(){
  const rows=[['ID','Title','Status','Priority','Category','Created','Pinned','Follow-up log','Attachments']];
  liveEntries().forEach(e=>{
    const log=combinedLog(e).map(u=>`[${fmtTime(u.ms)}] ${u.text}`).join(' || ');
    rows.push([
      e.id, e.title, e.status, e.priority, e.category,
      fmtTime(e.createdMs), e.pinned?'Yes':'No',
      log,
      e.attachments.length
    ]);
  });
  const csv='\uFEFF'+rows.map(r=>r.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(',')).join('\r\n');
  download(`${state.logName.replace(/\s+/g,'_')}_${dateStamp()}.csv`, csv, 'text/csv;charset=utf-8');
  toast('CSV exported');
}
function dateStamp(){ const d=new Date(); return `${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}`; }

/* ---------- MERGE ENGINE (newest-wins, id-based) ---------- */
function mergeOptData(data){
  if(!data || !Array.isArray(data.entries)) return null;
  const byId={}; state.entries.forEach(e=>byId[e.id]=e);
  let added=0,updated=0,kept=0;
  data.entries.forEach(inc=>{
    if(!inc || !inc.id) return;
    if(typeof inc.deleted!=='boolean') inc.deleted=false;
    if(typeof inc.modified!=='number') inc.modified = inc.createdMs || Date.now();
    if(!Array.isArray(inc.tags)) inc.tags=[];
    if(!Array.isArray(inc.updates)) inc.updates=[];
    if(!Array.isArray(inc.attachments)) inc.attachments=[];
    const cur=byId[inc.id];
    if(!cur){ state.entries.push(inc); byId[inc.id]=inc; added++; }
    else if((inc.modified||0)>(cur.modified||0)){ Object.assign(cur,inc); updated++; }
    else kept++;
  });
  // merge categories (union) so a new category from another device isn't lost
  if(Array.isArray(data.categories)) data.categories.forEach(c=>{ if(!state.categories.includes(c)) state.categories.push(c); });
  state.dataVersion=Math.max(state.dataVersion||1, data.dataVersion||1)+1;
  return {added,updated,kept};
}

function importData(){
  const inp=document.createElement('input'); inp.type='file'; inp.accept='.json,application/json';
  inp.onchange=()=>{
    const f=inp.files[0]; if(!f)return;
    const r=new FileReader();
    r.onload=()=>{
      try{
        const data=JSON.parse(r.result);
        if(!data.entries){ toast('Not a valid backup file'); return; }
        if(!master){ toast('Master Mode required to import'); return; }
        // version-guard
        const incMax=Math.max(0,...(data.entries||[]).map(x=>x&&x.modified||x&&x.createdMs||0));
        const curMax=Math.max(0,...state.entries.map(x=>x&&x.modified||x&&x.createdMs||0));
        if(incMax && incMax<curMax && (data.dataVersion||1)<=(state.dataVersion||1)){
          if(!confirm('This file looks OLDER than your current data (incoming v'+(data.dataVersion||1)+' vs this device v'+(state.dataVersion||1)+').\n\nMerging is still safe — newer entries always win — but check you are not importing a stale backup. Continue?')) return;
        } else {
          if(!confirm('Merge this backup into the current data? New entries are added; where the same entry exists, the newer version wins. Nothing is wiped.')) return;
        }
        const rep=mergeOptData(normalizeIncoming(data));
        save(); closePanel(); render(); renderTrash&&renderTrash();
        toast('Merged: +'+rep.added+' new, '+rep.updated+' updated');
      }catch(err){ toast('Could not read file'); }
    };
    r.readAsText(f);
  };
  if(!master){ toast('Triple-click the title for Master Mode first'); return; }
  inp.click();
}
// Ensure incoming entries have the sync fields without replacing local state.
function normalizeIncoming(data){
  (data.entries||[]).forEach(e=>{
    if(typeof e.modified!=='number') e.modified=e.createdMs||Date.now();
    if(typeof e.deleted!=='boolean') e.deleted=false;
  });
  return data;
}

/* ============ INIT ============ */
function init(){
  applyAppearance();
  render(); // first paint with defaults/empty
  // load persisted data from IndexedDB, then repaint
  dbGet(DB_KEY).then(raw=>{
    if(raw){ state = normalize(raw); }
    applyAppearance();
    render();
    refreshStorageEstimate();
    window.__appLoaded=true; if(window.__onAppLoaded)window.__onAppLoaded();
  }).catch(()=>{
    refreshStorageEstimate();
    window.__appLoaded=true; if(window.__onAppLoaded)window.__onAppLoaded();
  });
  document.addEventListener('fullscreenchange', render);
  document.addEventListener('webkitfullscreenchange', render);
  // ask the browser to keep this data (reduces automatic eviction under storage pressure)
  if(navigator.storage && navigator.storage.persist){ navigator.storage.persist().catch(()=>{}); }
}
init();
DESK_READY.then(suiteHomeBtn);
})();

  window.addEventListener('load',function(){ navigator.serviceWorker.register('./sw.js').catch(function(){}); });
}
