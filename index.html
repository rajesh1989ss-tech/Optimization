<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="theme-color" content="#0e1116">
<title>Optimizations</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@500;600;700;800&family=JetBrains+Mono:wght@400;500;600&family=Inter:wght@400;500;600;700&family=Source+Serif+4:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&family=Atkinson+Hyperlegible:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  /* default theme = dark (Carbon) */
  --bg: #0e1116;
  --bg-elev: #161b22;
  --bg-card: #1a2029;
  --bg-card-hover: #20262f;
  --border: #2a313c;
  --border-soft: #222831;
  --text: #e6edf3;
  --text-dim: #9aa6b2;
  --text-faint: #687078;
  --accent: #5b8def;
  --accent-soft: rgba(91,141,239,0.15);
  --open: #f25555;
  --progress: #f0a830;
  --closed: #3fb950;
  --log: #a371f7;
  --shadow: 0 4px 16px rgba(0,0,0,0.4);
  --shadow-lg: 0 12px 40px rgba(0,0,0,0.55);
  --radius: 16px;
  --radius-sm: 10px;
  --header-blur: rgba(14,17,22,0.72);
  /* typography */
  --font-head: 'Syne', sans-serif;
  --font-body: 'JetBrains Mono', monospace;
  --font-scale: 1;
}

/* ===== THEMES ===== */
[data-theme="light"] {
  --bg: #f4f6f9; --bg-elev: #ffffff; --bg-card: #ffffff; --bg-card-hover: #f0f3f7;
  --border: #d8dee6; --border-soft: #e6ebf1;
  --text: #1a2029; --text-dim: #5a6573; --text-faint: #8b95a1;
  --accent: #3366d6; --accent-soft: rgba(51,102,214,0.12);
  --open: #d63838; --progress: #c47d10; --closed: #2a9b3e; --log: #8250df;
  --shadow: 0 4px 16px rgba(40,50,70,0.10); --shadow-lg: 0 12px 40px rgba(40,50,70,0.18);
  --header-blur: rgba(244,246,249,0.78);
}
[data-theme="midnight"] {
  --bg: #0a0e27; --bg-elev: #111738; --bg-card: #161d44; --bg-card-hover: #1d2654;
  --border: #283269; --border-soft: #1d2654;
  --text: #e8ecff; --text-dim: #9aa3d4; --text-faint: #6670a8;
  --accent: #7c8cff; --accent-soft: rgba(124,140,255,0.16);
  --open: #ff6b8a; --progress: #ffb347; --closed: #4ad6a0; --log: #c08cff;
  --shadow: 0 4px 16px rgba(0,0,0,0.5); --shadow-lg: 0 12px 40px rgba(0,0,0,0.65);
  --header-blur: rgba(10,14,39,0.78);
}
[data-theme="ocean"] {
  --bg: #07212b; --bg-elev: #0c2e3a; --bg-card: #103a49; --bg-card-hover: #16485a;
  --border: #1d5468; --border-soft: #154352;
  --text: #e2f4f9; --text-dim: #8fb8c4; --text-faint: #5c8290;
  --accent: #2fc1c9; --accent-soft: rgba(47,193,201,0.16);
  --open: #ff7a6b; --progress: #ffc24d; --closed: #4fd99a; --log: #6fb3ff;
  --shadow: 0 4px 16px rgba(0,0,0,0.45); --shadow-lg: 0 12px 40px rgba(0,0,0,0.6);
  --header-blur: rgba(7,33,43,0.78);
}
[data-theme="forest"] {
  --bg: #0f1a12; --bg-elev: #15241a; --bg-card: #1b2e21; --bg-card-hover: #233a2a;
  --border: #2d4a36; --border-soft: #233a2a;
  --text: #e6f2e8; --text-dim: #9ab8a3; --text-faint: #647d6b;
  --accent: #4caf6e; --accent-soft: rgba(76,175,110,0.16);
  --open: #e8705c; --progress: #e0b03c; --closed: #56d07e; --log: #9d8cf0;
  --shadow: 0 4px 16px rgba(0,0,0,0.45); --shadow-lg: 0 12px 40px rgba(0,0,0,0.6);
  --header-blur: rgba(15,26,18,0.78);
}
[data-theme="rose"] {
  --bg: #fdf3f1; --bg-elev: #ffffff; --bg-card: #fff7f5; --bg-card-hover: #fdeae6;
  --border: #f0d4cd; --border-soft: #f7e4df;
  --text: #3a2420; --text-dim: #8a6a62; --text-faint: #b59890;
  --accent: #d4604f; --accent-soft: rgba(212,96,79,0.12);
  --open: #d63838; --progress: #c4820f; --closed: #2f9b5f; --log: #9d5fd0;
  --shadow: 0 4px 16px rgba(120,70,60,0.10); --shadow-lg: 0 12px 40px rgba(120,70,60,0.18);
  --header-blur: rgba(253,243,241,0.82);
}
[data-theme="sand"] {
  --bg: #f5f1e8; --bg-elev: #fffdf8; --bg-card: #fbf7ee; --bg-card-hover: #f2ebda;
  --border: #ded3bd; --border-soft: #e8dfcb;
  --text: #2e2a22; --text-dim: #6e6451; --text-faint: #9c8f76;
  --accent: #b07d3a; --accent-soft: rgba(176,125,58,0.14);
  --open: #c0492f; --progress: #b07d1a; --closed: #4a8f3f; --log: #8a6cc0;
  --shadow: 0 4px 16px rgba(90,75,40,0.10); --shadow-lg: 0 12px 40px rgba(90,75,40,0.18);
  --header-blur: rgba(245,241,232,0.82);
}
[data-theme="contrast"] {
  --bg: #000000; --bg-elev: #0a0a0a; --bg-card: #141414; --bg-card-hover: #1f1f1f;
  --border: #4a4a4a; --border-soft: #333333;
  --text: #ffffff; --text-dim: #d0d0d0; --text-faint: #a0a0a0;
  --accent: #4db8ff; --accent-soft: rgba(77,184,255,0.22);
  --open: #ff5555; --progress: #ffcc00; --closed: #44dd66; --log: #cc88ff;
  --shadow: 0 4px 16px rgba(0,0,0,0.7); --shadow-lg: 0 12px 40px rgba(0,0,0,0.8);
  --header-blur: rgba(0,0,0,0.85);
}
[data-theme="amoled"] {
  /* true-black for OLED screens: pure #000 surfaces, hairline borders, soft dimmed text */
  --bg: #000000; --bg-elev: #000000; --bg-card: #0a0a0c; --bg-card-hover: #131316;
  --border: #232327; --border-soft: #161619;
  --text: #e4e6e9; --text-dim: #8d929b; --text-faint: #55595f;
  --accent: #5b8def; --accent-soft: rgba(91,141,239,0.16);
  --open: #ff5c5c; --progress: #f2a93b; --closed: #38d070; --log: #b184ff;
  --shadow: 0 0 0 1px rgba(255,255,255,0.03); --shadow-lg: 0 12px 40px rgba(0,0,0,0.9);
  --header-blur: rgba(0,0,0,0.85);
}

/* ===== FONT FAMILIES ===== */
[data-font="mono"]   { --font-head:'Syne',sans-serif; --font-body:'JetBrains Mono',monospace; }
[data-font="sans"]   { --font-head:'Space Grotesk',sans-serif; --font-body:'Inter',sans-serif; }
[data-font="serif"]  { --font-head:'Source Serif 4',serif; --font-body:'Source Serif 4',serif; }
[data-font="legible"]{ --font-head:'Atkinson Hyperlegible',sans-serif; --font-body:'Atkinson Hyperlegible',sans-serif; }

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html, body { height:100%; }
body {
  background:var(--bg); color:var(--text);
  font-family:var(--font-body);
  font-size:calc(14px * var(--font-scale)); line-height:1.5;
  transition:background .3s, color .3s;
  overflow-x:hidden;
}
h1,h2,h3,h4,.syne { font-family:var(--font-head); }
button { font-family:inherit; cursor:pointer; border:none; background:none; color:inherit; }
input, textarea, select { font-family:inherit; font-size:1em; }
.mono { font-family:var(--font-body); }

/* themed scrollbars (Chromium/WebKit + Firefox) */
* { scrollbar-width:thin; scrollbar-color:var(--border) transparent; }
::-webkit-scrollbar { width:10px; height:10px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:var(--border); border-radius:8px; border:2px solid transparent; background-clip:padding-box; }
::-webkit-scrollbar-thumb:hover { background:var(--text-faint); border:2px solid transparent; background-clip:padding-box; }
::-webkit-scrollbar-corner { background:transparent; }

/* SHELL LAYOUT */
.shell { display:flex; min-height:100vh; }
.master-badge {
  font-size:calc(10px * var(--font-scale)); font-weight:700; padding:2px 7px; border-radius:20px;
  background:var(--accent-soft); color:var(--accent); letter-spacing:.5px;
  display:none; flex-shrink:0;
}
.master-badge.on { display:inline-block; }

/* SIDEBAR RAIL */
.sidebar {
  position:fixed; top:0; left:0;
  height:100vh; width:76px; flex-shrink:0;
  background:var(--bg-elev); border-right:1px solid var(--border-soft);
  display:flex; flex-direction:column; align-items:center;
  padding:14px 0 16px; gap:4px; z-index:60; overflow-y:auto; scrollbar-width:none;
  transform:translateX(-100%); transition:transform .25s ease; box-shadow:var(--shadow-lg);
}
.sidebar.open { transform:translateX(0); }
.sidebar::-webkit-scrollbar { display:none; }
.rail-logo {
  width:46px; height:46px; border-radius:14px; background:var(--accent);
  display:flex; align-items:center; justify-content:center; gap:2px; flex-direction:column;
  cursor:pointer; user-select:none; margin-bottom:8px; position:relative; flex-shrink:0;
  box-shadow:0 4px 12px rgba(91,141,239,0.4);
}
.rail-logo .rl-dot { width:14px; height:14px; border-radius:50%; background:#fff; }
.rail-logo .master-badge { position:absolute; bottom:-6px; right:-6px; background:var(--progress); color:#fff; padding:1px 5px; font-size:calc(9px * var(--font-scale)); }
.rail-items { display:flex; flex-direction:column; align-items:center; gap:3px; width:100%; }
.rail-sep { width:34px; height:1px; background:var(--border-soft); margin:6px 0; flex-shrink:0; }
.rail-btn {
  width:60px; padding:8px 0 6px; border-radius:14px;
  display:flex; flex-direction:column; align-items:center; gap:3px;
  color:var(--text-dim); transition:background .15s, color .15s; position:relative; flex-shrink:0;
}
.rail-btn:hover { background:var(--bg-card); color:var(--text); }
.rail-btn.on { background:var(--accent-soft); color:var(--accent); }
.rail-btn.rail-accent { color:var(--accent); }
.rail-btn.rail-accent .rail-ic { background:var(--accent-soft); border-radius:10px; }
.rail-ic { font-size:calc(20px * var(--font-scale)); line-height:1; height:26px; display:flex; align-items:center; justify-content:center; width:38px; }
.rail-ic svg { display:block; }
.rail-lbl { font-family:'Syne',sans-serif; font-size:calc(10px * var(--font-scale)); font-weight:600; letter-spacing:.2px; }

/* drawer controls — hamburger always visible, rail hidden until opened */
.hamburger { display:flex; width:40px; height:40px; border-radius:10px; font-size:calc(20px * var(--font-scale)); align-items:center; justify-content:center; flex-shrink:0; }
.hamburger:hover { background:var(--bg-card); }
.drawer-backdrop { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:55; }
.drawer-backdrop.on { display:block; }

/* MOBILE tweaks */
@media (max-width:920px){
  .stat-pills { margin-left:0; }
  .topbar { gap:10px; }
}

/* MAIN COLUMN */
.main-col { flex:1; min-width:0; display:flex; flex-direction:column; }

/* TOPBAR */
.topbar {
  position:sticky; top:0; z-index:45;
  background:var(--header-blur); backdrop-filter:blur(16px); -webkit-backdrop-filter:blur(16px);
  border-bottom:1px solid var(--border-soft);
  padding:12px 18px; display:flex; align-items:center; gap:14px; flex-wrap:wrap;
}
.tb-left { display:flex; align-items:center; gap:10px; min-width:0; }
.tb-title { display:flex; align-items:center; gap:8px; min-width:0; }
.tb-name { font-family:'Syne',sans-serif; font-weight:800; font-size:calc(20px * var(--font-scale)); letter-spacing:-0.5px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.storage-chip {
  display:inline-flex; align-items:center; gap:7px; flex-shrink:0;
  padding:4px 10px; border-radius:20px; background:var(--bg-card);
  border:1px solid var(--border-soft); transition:border-color .15s;
}
.storage-chip:hover { border-color:var(--accent); }
.sc-bar { width:46px; height:6px; border-radius:4px; background:var(--bg-elev); border:1px solid var(--border-soft); overflow:hidden; }
.sc-fill { display:block; height:100%; border-radius:4px; background:var(--accent); transition:width .3s; }
.sc-txt { font-family:var(--font-body); font-size:calc(10px * var(--font-scale)); color:var(--text-dim); white-space:nowrap; }
.storage-chip.near { border-color:rgba(240,168,48,0.5); }
.storage-chip.near .sc-fill { background:var(--progress); }
.storage-chip.near .sc-txt { color:var(--progress); }
@media (max-width:560px){
  .storage-chip .sc-txt { display:none; }
}

/* STATS PILLS */
.stat-pills { display:flex; gap:6px; overflow-x:auto; scrollbar-width:none; margin-left:auto; }
.stat-pills::-webkit-scrollbar { display:none; }
.pill {
  flex-shrink:0; padding:5px 11px; border-radius:20px; font-size:calc(11px * var(--font-scale)); font-weight:500;
  background:var(--bg-card); border:1px solid var(--border-soft);
  display:flex; align-items:center; gap:6px; white-space:nowrap;
}
.pill .num { font-weight:600; color:var(--text); }
.pill .lbl { color:var(--text-dim); }
.pill .cdot { width:7px; height:7px; border-radius:50%; }

/* RAIL POPOVERS */
.rail-pop {
  position:fixed; z-index:80; min-width:240px; max-width:min(300px,90vw);
  background:var(--bg-elev); border:1px solid var(--border);
  border-radius:14px; box-shadow:var(--shadow-lg); padding:14px; display:none;
}
.rail-pop.on { display:block; animation:fadeIn .12s; }
.rp-head { font-family:'Syne',sans-serif; font-size:calc(12px * var(--font-scale)); letter-spacing:.5px; text-transform:uppercase; color:var(--text-faint); margin-bottom:10px; }
.search-wrap { position:relative; }
.search-wrap .si { position:absolute; left:12px; top:50%; transform:translateY(-50%); color:var(--text-faint); font-size:calc(14px * var(--font-scale)); }
.search {
  width:100%; padding:10px 14px 10px 36px; border-radius:11px;
  background:var(--bg-card); border:1px solid var(--border); color:var(--text); font-size:calc(13px * var(--font-scale));
}
.search:focus { outline:none; border-color:var(--accent); }
.sort-list { display:flex; flex-direction:column; gap:4px; }
.sort-opt { padding:9px 12px; border-radius:9px; text-align:left; font-size:calc(13px * var(--font-scale)); color:var(--text-dim); transition:background .12s; }
.sort-opt:hover { background:var(--bg-card); color:var(--text); }
.sort-opt.on { background:var(--accent-soft); color:var(--accent); font-weight:600; }

/* overflow sheet menu list */
.menu-list { display:flex; flex-direction:column; gap:2px; }
.menu-list button { display:flex; align-items:center; gap:10px; width:100%; padding:13px 14px; font-size:calc(14px * var(--font-scale)); text-align:left; border-radius:10px; transition:background .12s; }
.menu-list button:hover { background:var(--bg-card); }
.menu-list .ml-sep { height:1px; background:var(--border-soft); margin:6px 0; }

/* FILTERS */
.filters { padding:12px 18px 4px; }
.filter-row { display:flex; gap:6px; overflow-x:auto; padding-bottom:8px; scrollbar-width:none; flex-wrap:wrap; }
.filter-row::-webkit-scrollbar { display:none; }
.filter-row.cats { margin-top:2px; }
.fbtn {
  flex-shrink:0; padding:6px 12px; border-radius:20px; font-size:calc(11px * var(--font-scale)); font-weight:500;
  background:var(--bg-card); border:1px solid var(--border-soft); color:var(--text-dim);
  display:flex; align-items:center; gap:6px; white-space:nowrap; transition:all .15s;
}
.fbtn.on { background:var(--accent-soft); border-color:var(--accent); color:var(--accent); }
.fbtn .badge { font-size:calc(10px * var(--font-scale)); opacity:.8; }
.fbtn .cdot { width:7px; height:7px; border-radius:50%; }


/* LIST */
.list { padding:8px 16px 120px; }
.empty { text-align:center; padding:60px 20px; color:var(--text-faint); }
.empty .big { font-size:calc(42px * var(--font-scale)); margin-bottom:12px; }
.empty .t { font-family:'Syne',sans-serif; font-size:calc(16px * var(--font-scale)); color:var(--text-dim); margin-bottom:6px; }
.section-label { font-size:calc(10px * var(--font-scale)); color:var(--text-faint); letter-spacing:1.5px; text-transform:uppercase; margin:14px 2px 8px; display:flex; align-items:center; gap:6px; }

/* ===== TIMELINE VIEW ===== */
.timeline { position:relative; }
.tl-spine { position:absolute; left:33px; top:20px; bottom:60px; width:2px; background:var(--border); border-radius:2px; }
.tl-year { position:relative; margin:20px 0 12px; padding-left:56px; }
.tl-year span { font-family:var(--font-head); font-weight:800; font-size:calc(24px * var(--font-scale)); letter-spacing:1px; color:var(--text-dim); }
.tl-year::before { content:''; position:absolute; left:33px; top:50%; width:10px; height:10px; transform:translate(-50%,-50%) rotate(45deg); background:var(--text-dim); border-radius:2px; }
.tl-item { position:relative; padding-left:56px; margin-bottom:14px; cursor:pointer; }
.tl-item::before { /* connector stem, pin → card */
  content:''; position:absolute; left:33px; top:24px; width:23px; height:2px; background:var(--tlc,var(--accent)); opacity:.7;
}
.tl-pin { position:absolute; left:33px; top:24px; transform:translate(-50%,-50%); width:22px; height:22px; z-index:1; }
.tl-ring { position:absolute; inset:0; border:2px solid; border-radius:50%; background:var(--bg); }
.tl-dot { position:absolute; left:50%; top:50%; width:8px; height:8px; transform:translate(-50%,-50%); border-radius:50%; }
.tl-card {
  background:var(--bg-card); border:1px solid var(--border-soft);
  border-left:3px solid var(--tlc,var(--accent));
  border-radius:var(--radius); padding:12px 14px; box-shadow:var(--shadow);
  transition:background .15s;
}
.tl-item:active .tl-card, .tl-item:hover .tl-card { background:var(--bg-card-hover); }
.tl-date { display:flex; align-items:baseline; gap:8px; }
.tl-day { font-family:var(--font-head); font-weight:800; font-size:calc(28px * var(--font-scale)); line-height:1; }
.tl-mon { font-family:var(--font-head); font-weight:700; font-size:calc(11px * var(--font-scale)); letter-spacing:1.8px; }
.tl-title { font-family:var(--font-head); font-weight:700; font-size:calc(15px * var(--font-scale)); margin:7px 0 7px; color:var(--text); }
.tl-star { color:var(--progress); margin-right:5px; }
.tl-chips { display:flex; flex-wrap:wrap; gap:5px; }
.tl-chip { font-size:calc(10px * var(--font-scale)); font-weight:600; border:1px solid var(--border); border-radius:999px; padding:2px 9px; letter-spacing:.4px; }
.tl-chip.dim { color:var(--text-dim); }
.tl-snip {
  color:var(--text-dim); font-size:calc(12.5px * var(--font-scale)); margin-top:7px;
  display:-webkit-box; -webkit-line-clamp:3; -webkit-box-orient:vertical; overflow:hidden;
}
.tl-thumb { margin-top:9px; width:86px; height:86px; object-fit:cover; border-radius:var(--radius-sm); border:1px solid var(--border-soft); display:block; }

@media (min-width:920px){
  .timeline { max-width:980px; margin:0 auto; width:100%; }
  .tl-spine { left:50%; transform:translateX(-50%); }
  .tl-year { padding-left:0; text-align:center; }
  .tl-year::before { display:none; }
  .tl-year span { background:var(--bg-elev); border:1px solid var(--border); border-radius:999px; padding:4px 20px; display:inline-block; position:relative; z-index:1; }
  .tl-item { width:50%; padding-left:0; }
  .tl-item.tl-left  { padding-right:44px; }
  .tl-item.tl-right { margin-left:50%; padding-left:44px; }
  .tl-left  .tl-pin { left:auto; right:0; transform:translate(50%,-50%); }
  .tl-right .tl-pin { left:0; transform:translate(-50%,-50%); }
  .tl-left::before  { left:auto; right:10px; width:34px; }
  .tl-right::before { left:10px; width:34px; }
  .tl-left  .tl-card { border-left:1px solid var(--border-soft); border-right:3px solid var(--tlc,var(--accent)); }
  .tl-left  .tl-date, .tl-left .tl-title { text-align:right; }
  .tl-left  .tl-date { justify-content:flex-end; }
  .tl-left  .tl-chips { justify-content:flex-end; }
  .tl-left  .tl-thumb { margin-left:auto; }
}

.card {
  background:var(--bg-card); border:1px solid var(--border-soft);
  border-radius:var(--radius); margin-bottom:10px; overflow:hidden;
  transition:background .15s, border-color .15s, transform .1s;
}
.card:active { transform:scale(.995); }
.card.pinned { border-color:rgba(240,168,48,0.4); }
.card-head {
  display:flex; align-items:center; gap:10px; padding:14px 14px;
  cursor:pointer; user-select:none;
}
.dots { display:flex; align-items:center; gap:7px; flex-shrink:0; }
.pdot { width:8px; height:8px; border-radius:50%; }
.sdot { width:9px; height:9px; border-radius:50%; }
.card-title { flex:1; min-width:0; font-weight:500; font-size:calc(14px * var(--font-scale)); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.card.expanded .card-title { white-space:normal; }
.card-meta-mini { display:flex; align-items:center; gap:9px; flex-shrink:0; color:var(--text-faint); font-size:calc(11px * var(--font-scale)); }
.card-meta-mini .star { font-size:calc(14px * var(--font-scale)); }
.card-meta-mini .star.on { color:var(--progress); }
.card-meta-mini .bell { font-size:calc(12px * var(--font-scale)); color:var(--progress); }
.cm-count { display:flex; align-items:center; gap:2px; }

/* EXPANDED */
.card-body { display:none; padding:0 14px 14px; }
.card.expanded .card-body { display:block; }
.cb-time { font-size:calc(11px * var(--font-scale)); color:var(--text-faint); margin-bottom:10px; line-height:1.7; }
.inline-edits { display:flex; flex-wrap:wrap; gap:7px; margin-bottom:12px; }
.ie {
  display:flex; flex-direction:column; gap:3px;
}
.ie label { font-size:calc(9px * var(--font-scale)); color:var(--text-faint); letter-spacing:.8px; text-transform:uppercase; padding-left:2px; }
.ie select, .ie input {
  padding:6px 9px; border-radius:8px; background:var(--bg-elev);
  border:1px solid var(--border); color:var(--text); font-size:calc(12px * var(--font-scale));
}
.ie select:focus, .ie input:focus { outline:none; border-color:var(--accent); }
.cb-desc { font-size:calc(13px * var(--font-scale)); color:var(--text-dim); line-height:1.6; margin-bottom:12px; white-space:pre-wrap; word-break:break-word; }
.tag-chips { display:flex; flex-wrap:wrap; gap:5px; margin-bottom:12px; }
.tchip {
  font-size:calc(10px * var(--font-scale)); padding:3px 9px; border-radius:14px;
  background:var(--accent-soft); color:var(--accent); font-weight:500;
  display:flex; align-items:center; gap:5px;
}
.tchip .x { cursor:pointer; opacity:.6; font-size:calc(11px * var(--font-scale)); }
.tag-add { display:flex; gap:6px; margin-bottom:12px; }
.tag-add input { flex:1; padding:6px 10px; border-radius:8px; background:var(--bg-elev); border:1px solid var(--border); color:var(--text); font-size:calc(12px * var(--font-scale)); }
.tag-add input:focus { outline:none; border-color:var(--accent); }
.tag-add button { padding:6px 12px; border-radius:8px; background:var(--accent-soft); color:var(--accent); font-size:calc(12px * var(--font-scale)); font-weight:500; }

.sub-h { font-size:calc(10px * var(--font-scale)); color:var(--text-faint); letter-spacing:1px; text-transform:uppercase; margin:14px 0 8px; }
.attach-grid { display:flex; flex-wrap:wrap; gap:8px; margin-bottom:10px; }
.attach-thumb {
  width:104px; height:104px; border-radius:10px; object-fit:cover;
  border:1px solid var(--border); cursor:pointer; background:var(--bg-elev);
}
.attach-file {
  display:flex; align-items:center; gap:6px; padding:7px 11px; border-radius:8px;
  background:var(--bg-elev); border:1px solid var(--border); font-size:calc(11px * var(--font-scale)); cursor:pointer;
}

/* staged (pre-save) attachments: delete + drag-reorder */
.staged-grid { display:flex; flex-wrap:wrap; gap:10px; margin-bottom:10px; }
.staged-item {
  position:relative; width:104px; height:104px; border-radius:10px; overflow:hidden;
  border:1px solid var(--border); background:var(--bg-elev); cursor:grab;
  transition:transform .12s, box-shadow .12s, opacity .12s;
}
.staged-item:active { cursor:grabbing; }
.staged-item img { width:100%; height:100%; object-fit:cover; display:block; pointer-events:none; }
.staged-file { width:100%; height:100%; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:5px; font-size:calc(22px * var(--font-scale)); color:var(--text-dim); padding:6px; }
.staged-file span { font-size:calc(9px * var(--font-scale)); text-align:center; word-break:break-word; line-height:1.2; }
.staged-item.dragging { opacity:.45; }
.staged-item.drop-target { box-shadow:0 0 0 2px var(--accent) inset; transform:scale(1.04); }
.staged-del {
  position:absolute; top:4px; right:4px; width:24px; height:24px; border-radius:50%;
  background:rgba(0,0,0,0.65); color:#fff; font-size:13px; line-height:1;
  display:flex; align-items:center; justify-content:center; z-index:2;
}
.staged-del:hover { background:var(--open); }
.staged-handle {
  position:absolute; bottom:4px; left:4px; padding:1px 5px; border-radius:6px;
  background:rgba(0,0,0,0.55); color:#fff; font-size:11px; letter-spacing:-1px;
  opacity:.8; pointer-events:none; user-select:none;
}

.drop-zone {
  border:1.5px dashed var(--border); border-radius:10px; padding:14px;
  text-align:center; font-size:calc(11px * var(--font-scale)); color:var(--text-faint); cursor:pointer;
  transition:border-color .15s, background .15s; margin-bottom:12px;
}
.drop-zone.over { border-color:var(--accent); background:var(--accent-soft); }

.updates { display:flex; flex-direction:column; gap:8px; margin-bottom:10px; }
.update {
  background:var(--bg-elev); border:1px solid var(--border-soft);
  border-radius:10px; padding:10px 12px;
}
.update .ut { font-size:calc(10px * var(--font-scale)); color:var(--text-faint); line-height:1.5; margin-bottom:5px; font-weight:500; }
.update .ux { font-size:calc(12px * var(--font-scale)); color:var(--text-dim); white-space:pre-wrap; word-break:break-word; }
.update .uatt { display:flex; flex-wrap:wrap; gap:6px; margin-top:7px; }
.update .uatt img { width:48px; height:48px; border-radius:7px; object-fit:cover; cursor:pointer; border:1px solid var(--border); }
.add-update { display:flex; flex-direction:column; gap:7px; margin-bottom:12px; }
.add-update textarea {
  width:100%; padding:9px 11px; border-radius:9px; background:var(--bg-elev);
  border:1px solid var(--border); color:var(--text); font-size:calc(12px * var(--font-scale)); resize:vertical; min-height:54px;
}
.add-update textarea:focus { outline:none; border-color:var(--accent); }
.au-row { display:flex; gap:7px; }
.au-row button { flex:1; padding:8px; border-radius:9px; font-size:calc(12px * var(--font-scale)); font-weight:500; }
.au-attach { background:var(--bg-elev); border:1px solid var(--border); color:var(--text-dim); }
.au-save { background:var(--accent); color:#fff; }

.cb-actions { display:flex; gap:7px; margin-top:14px; }
.cb-actions button {
  flex:1; padding:10px; border-radius:10px; font-size:calc(12px * var(--font-scale)); font-weight:500;
  display:flex; align-items:center; justify-content:center; gap:5px;
  background:var(--bg-elev); border:1px solid var(--border); color:var(--text);
}
.cb-actions .del { color:var(--open); border-color:rgba(242,85,85,0.3); }
.cb-actions button:disabled { opacity:.35; cursor:not-allowed; }

/* FAB */
.fab {
  position:fixed; bottom:24px; right:20px; z-index:40;
  width:58px; height:58px; border-radius:50%;
  background:var(--accent); color:#fff; font-size:calc(28px * var(--font-scale)); font-weight:300;
  box-shadow:0 6px 20px rgba(91,141,239,0.45);
  display:flex; align-items:center; justify-content:center;
  transition:transform .15s;
}
.fab:active { transform:scale(.92); }

/* MODAL / BOTTOM SHEET */
.overlay {
  position:fixed; inset:0; z-index:100; background:rgba(0,0,0,0.55);
  display:none; align-items:flex-end; justify-content:center;
  backdrop-filter:blur(2px);
}
.overlay.on { display:flex; }
.sheet {
  background:var(--bg-elev); width:100%; max-width:640px;
  border-radius:22px 22px 0 0; max-height:92vh; overflow-y:auto;
  box-shadow:var(--shadow-lg); animation:slideUp .25s ease;
}
@keyframes slideUp { from { transform:translateY(40px); opacity:.6; } to { transform:translateY(0); opacity:1; } }
.sheet-grip { width:40px; height:4px; border-radius:3px; background:var(--border); margin:10px auto 4px; }
.sheet-head { display:flex; align-items:center; justify-content:space-between; padding:8px 18px 12px; }
.sheet-head h2 { font-size:calc(18px * var(--font-scale)); font-weight:700; }
.sheet-head .close { font-size:calc(22px * var(--font-scale)); color:var(--text-dim); width:34px; height:34px; border-radius:8px; }
.sheet-body { padding:0 18px 24px; }
.field { margin-bottom:14px; }
.field label { display:block; font-size:calc(10px * var(--font-scale)); color:var(--text-faint); letter-spacing:.8px; text-transform:uppercase; margin-bottom:6px; padding-left:2px; }
.field input, .field textarea, .field select {
  width:100%; padding:11px 13px; border-radius:11px; background:var(--bg-card);
  border:1px solid var(--border); color:var(--text); font-size:calc(14px * var(--font-scale));
}
.field input:focus, .field textarea:focus, .field select:focus { outline:none; border-color:var(--accent); }
.field textarea { resize:vertical; min-height:80px; }
.field-2 { display:flex; gap:10px; }
.field-2 > div { flex:1; }
.seg { display:flex; gap:6px; }
.seg button {
  flex:1; padding:9px; border-radius:9px; font-size:calc(12px * var(--font-scale)); font-weight:500;
  background:var(--bg-card); border:1px solid var(--border); color:var(--text-dim);
}
.seg button.on { color:#fff; }
.seg button.on[data-v="Open"] { background:var(--open); border-color:var(--open); }
.seg button.on[data-v="In Progress"] { background:var(--progress); border-color:var(--progress); }
.seg button.on[data-v="Closed"] { background:var(--closed); border-color:var(--closed); }
.seg button.on[data-v="Just a Log"] { background:var(--log); border-color:var(--log); }
.seg.prio button.on[data-v="Low"] { background:var(--text-faint); border-color:var(--text-faint); }
.seg.prio button.on[data-v="Medium"] { background:var(--progress); border-color:var(--progress); }
.seg.prio button.on[data-v="High"] { background:var(--open); border-color:var(--open); }
.save-btn {
  width:100%; padding:14px; border-radius:13px; background:var(--accent);
  color:#fff; font-size:calc(15px * var(--font-scale)); font-weight:600; margin-top:6px;
}
.template-picker { display:flex; gap:7px; flex-wrap:wrap; margin-bottom:8px; }
.tpl-chip { padding:7px 12px; border-radius:9px; background:var(--bg-card); border:1px solid var(--border); font-size:calc(12px * var(--font-scale)); color:var(--text-dim); }
.tpl-chip:active { border-color:var(--accent); }

/* GENERIC FULLSCREEN PANEL */
.panel {
  position:fixed; inset:0; z-index:110; background:var(--bg);
  display:none; flex-direction:column; animation:fadeIn .2s;
}
.panel.on { display:flex; }
@keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
.panel-head {
  display:flex; align-items:center; gap:12px; padding:16px;
  border-bottom:1px solid var(--border-soft); flex-shrink:0;
  background:var(--header-blur); backdrop-filter:blur(12px);
}
.panel-head h2 { flex:1; font-size:calc(18px * var(--font-scale)); font-weight:700; }
.panel-head button { width:38px; height:38px; border-radius:10px; font-size:calc(18px * var(--font-scale)); display:flex; align-items:center; justify-content:center; }
.panel-head button:hover { background:var(--bg-card); }
.panel-body { flex:1; overflow-y:auto; padding:18px; }

/* PRESENT VIEW */
.present-body { max-width:720px; margin:0 auto; }
.present-id { font-size:calc(12px * var(--font-scale)); color:var(--text-faint); letter-spacing:1px; margin-bottom:8px; }
.present-title { font-family:'Syne',sans-serif; font-size:calc(28px * var(--font-scale)); font-weight:700; line-height:1.2; margin-bottom:14px; }
.present-badges { display:flex; flex-wrap:wrap; gap:8px; margin-bottom:18px; }
.pbadge { padding:6px 13px; border-radius:20px; font-size:calc(12px * var(--font-scale)); font-weight:600; color:#fff; }
.present-meta { font-size:calc(13px * var(--font-scale)); color:var(--text-dim); margin-bottom:18px; line-height:1.8; }
.present-desc { font-size:calc(16px * var(--font-scale)); line-height:1.7; margin-bottom:22px; white-space:pre-wrap; }
.present-section-h { font-family:'Syne',sans-serif; font-size:calc(14px * var(--font-scale)); letter-spacing:1px; text-transform:uppercase; color:var(--text-faint); margin:20px 0 12px; }
.present-photos { display:grid; grid-template-columns:repeat(auto-fill,minmax(220px,1fr)); gap:12px; margin-bottom:20px; }
.present-photos img { width:100%; max-height:420px; object-fit:cover; border-radius:12px; cursor:pointer; display:block; }
.present-update { border-left:3px solid var(--accent); padding:8px 0 8px 16px; margin-bottom:16px; }
.present-update .put { font-size:calc(12px * var(--font-scale)); color:var(--text-faint); line-height:1.6; font-weight:600; margin-bottom:5px; }
.present-update .pux { font-size:calc(15px * var(--font-scale)); line-height:1.6; white-space:pre-wrap; }

/* present follow-up log as 2-column table */
.present-log-table { border:1px solid var(--border); border-radius:12px; overflow:hidden; }
.plt-head, .plt-row { display:grid; grid-template-columns:170px 1fr; }
.plt-head { background:var(--bg-card); border-bottom:1px solid var(--border); }
.plt-head > div { padding:10px 14px; font-family:var(--font-head); font-size:calc(11px * var(--font-scale)); letter-spacing:.8px; text-transform:uppercase; color:var(--text-faint); font-weight:600; }
.plt-row { border-bottom:1px solid var(--border-soft); }
.plt-row:last-child { border-bottom:none; }
.plt-c1 { padding:12px 14px; border-right:1px solid var(--border-soft); font-size:calc(12px * var(--font-scale)); color:var(--text-dim); font-weight:600; line-height:1.5; white-space:nowrap; }
.plt-c2 { padding:12px 14px; font-size:calc(15px * var(--font-scale)); line-height:1.6; white-space:pre-wrap; word-break:break-word; }
/* photos inside the log table: large, uncropped */
.plt-c2 .present-photos { display:grid; grid-template-columns:repeat(auto-fill,minmax(200px,1fr)); gap:10px; margin:10px 0 2px; }
.plt-c2 .present-photos img { width:100%; max-height:380px; object-fit:contain; background:var(--bg-card); border:1px solid var(--border-soft); border-radius:10px; }
@media (max-width:560px){
  .plt-head { display:none; }
  .plt-row { grid-template-columns:1fr; }
  .plt-c1 { border-right:none; border-bottom:1px dashed var(--border-soft); white-space:normal; color:var(--text-faint); }
  .present-photos { grid-template-columns:1fr; }
}

/* LIGHTBOX */
.lightbox {
  position:fixed; inset:0; z-index:200; background:rgba(0,0,0,0.94);
  display:none; align-items:center; justify-content:center; flex-direction:column;
}
.lightbox.on { display:flex; }
.lightbox img { max-width:94vw; max-height:82vh; object-fit:contain; border-radius:8px; }
.lb-nav { position:absolute; top:50%; transform:translateY(-50%); font-size:calc(40px * var(--font-scale)); color:#fff; opacity:.7; padding:16px; user-select:none; }
.lb-prev { left:6px; } .lb-next { right:6px; }
.lb-close { position:absolute; top:16px; right:16px; font-size:calc(30px * var(--font-scale)); color:#fff; width:46px; height:46px; }
.lb-count { position:absolute; bottom:24px; color:#fff; font-size:calc(13px * var(--font-scale)); opacity:.7; }

/* CALENDAR */
.cal-controls { display:flex; align-items:center; gap:10px; margin-bottom:14px; flex-wrap:wrap; }
.cal-nav { display:flex; align-items:center; gap:8px; }
.cal-nav button { width:34px; height:34px; border-radius:9px; background:var(--bg-card); border:1px solid var(--border); font-size:calc(16px * var(--font-scale)); }
.cal-month { font-family:'Syne',sans-serif; font-size:calc(17px * var(--font-scale)); font-weight:700; min-width:150px; text-align:center; }
.cal-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:5px; }
.cal-dow { text-align:center; font-size:calc(10px * var(--font-scale)); color:var(--text-faint); padding:4px 0; font-weight:600; }
.cal-cell {
  aspect-ratio:1; border-radius:9px; background:var(--bg-card); border:1px solid var(--border-soft);
  padding:4px; display:flex; flex-direction:column; gap:2px; overflow:hidden; min-height:48px;
}
.cal-cell.other { opacity:.35; }
.cal-cell.today { border-color:var(--accent); }
.cal-cell .cd { font-size:calc(11px * var(--font-scale)); color:var(--text-dim); font-weight:600; }
.cal-chip { font-size:calc(8px * var(--font-scale)); padding:1px 4px; border-radius:4px; color:#fff; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; cursor:pointer; }
.cal-more { font-size:calc(8px * var(--font-scale)); color:var(--text-faint); }
.cal-toggle-row { display:flex; gap:8px; margin-bottom:12px; flex-wrap:wrap; }
.cal-range { display:flex; gap:8px; align-items:flex-end; flex-wrap:wrap; margin-top:16px; padding-top:16px; border-top:1px solid var(--border-soft); }

/* STATS */
.stat-cards { display:grid; grid-template-columns:repeat(auto-fit,minmax(140px,1fr)); gap:10px; margin-bottom:20px; }
.stat-card { background:var(--bg-card); border:1px solid var(--border-soft); border-radius:14px; padding:16px; }
.stat-card .sv { font-family:'Syne',sans-serif; font-size:calc(30px * var(--font-scale)); font-weight:700; }
.stat-card .sl { font-size:calc(11px * var(--font-scale)); color:var(--text-dim); margin-top:4px; }
.bar-chart { margin-bottom:24px; }
.bar-chart h3 { font-family:'Syne',sans-serif; font-size:calc(13px * var(--font-scale)); letter-spacing:.5px; margin-bottom:12px; color:var(--text-dim); }
.bar-row { display:flex; align-items:center; gap:10px; margin-bottom:8px; }
.bar-row .bl { font-size:calc(11px * var(--font-scale)); width:90px; flex-shrink:0; color:var(--text-dim); text-overflow:ellipsis; overflow:hidden; white-space:nowrap; }
.bar-track { flex:1; height:22px; background:var(--bg-card); border-radius:6px; overflow:hidden; }
.bar-fill { height:100%; border-radius:6px; min-width:2px; transition:width .4s; }
.bar-row .bv { font-size:calc(11px * var(--font-scale)); width:28px; text-align:right; color:var(--text-dim); }
.trend { display:flex; align-items:flex-end; gap:8px; height:140px; padding-top:10px; }
.trend-col { flex:1; display:flex; flex-direction:column; align-items:center; gap:4px; height:100%; justify-content:flex-end; }
.trend-bars { display:flex; gap:3px; align-items:flex-end; flex:1; width:100%; justify-content:center; }
.trend-bar { width:12px; border-radius:3px 3px 0 0; min-height:2px; }
.trend-lbl { font-size:calc(9px * var(--font-scale)); color:var(--text-faint); }
.legend { display:flex; gap:14px; margin-bottom:12px; flex-wrap:wrap; }
.legend span { font-size:calc(11px * var(--font-scale)); color:var(--text-dim); display:flex; align-items:center; gap:5px; }
.legend .cdot { width:9px; height:9px; border-radius:2px; }

/* SETTINGS */
.set-section { margin-bottom:24px; }
.set-section h3 { font-family:'Syne',sans-serif; font-size:calc(14px * var(--font-scale)); margin-bottom:12px; display:flex; align-items:center; gap:8px; }
.set-section .lock-note { font-size:calc(10px * var(--font-scale)); color:var(--text-faint); }
.cat-list, .tpl-list { display:flex; flex-direction:column; gap:7px; margin-bottom:10px; }
.cat-item, .tpl-item {
  display:flex; align-items:center; gap:8px; padding:9px 12px; border-radius:10px;
  background:var(--bg-card); border:1px solid var(--border-soft);
}
.cat-item input { flex:1; background:transparent; border:none; color:var(--text); font-size:calc(13px * var(--font-scale)); }
.cat-item input:focus { outline:none; }
.cat-item .rm, .tpl-item .rm { color:var(--open); font-size:calc(16px * var(--font-scale)); padding:2px 6px; }
.tpl-item { flex-direction:column; align-items:stretch; gap:6px; }
.tpl-item .tpl-name { font-weight:600; font-size:calc(13px * var(--font-scale)); display:flex; justify-content:space-between; align-items:center; }
.tpl-item .tpl-meta { font-size:calc(11px * var(--font-scale)); color:var(--text-dim); }
.add-inline { display:flex; gap:8px; }
.add-inline input { flex:1; padding:9px 12px; border-radius:10px; background:var(--bg-card); border:1px solid var(--border); color:var(--text); font-size:calc(13px * var(--font-scale)); }
.add-inline button { padding:9px 16px; border-radius:10px; background:var(--accent); color:#fff; font-size:calc(13px * var(--font-scale)); font-weight:500; }
.locked-msg { padding:14px; border-radius:12px; background:var(--bg-card); border:1px dashed var(--border); text-align:center; font-size:calc(12px * var(--font-scale)); color:var(--text-faint); }
.theme-row { display:flex; gap:8px; }
.theme-row button { flex:1; padding:11px; border-radius:11px; background:var(--bg-card); border:1px solid var(--border); font-size:calc(13px * var(--font-scale)); }
.theme-row button.on { border-color:var(--accent); color:var(--accent); background:var(--accent-soft); }

/* storage meter */
.storage-meter { margin-bottom:14px; }
.sm-row { display:flex; justify-content:space-between; align-items:baseline; margin-bottom:6px; }
.sm-label { font-family:var(--font-head); font-size:calc(12px * var(--font-scale)); font-weight:600; color:var(--text-dim); letter-spacing:.5px; }
.sm-val { font-family:var(--font-body); font-size:calc(12px * var(--font-scale)); color:var(--text-dim); }

<script>
/* ============ Optimizations v3 ============ */
(function(){
'use strict';
/* ===== Ship Suite desktop bridge (added) ===== */
var SUITE_NS='opt';
var DESK=null, IS_DESK=false;
var DESK_READY=new Promise(function(res){

const DB_NAME = 'optimizations_v3_db';
const DB_STORE = 'app';
const DB_KEY = 'state';
const MASTER_TIMEOUT = 10*60*1000;
const DEFAULT_CATS = ['Cargo','Engine','Bridge','Marpol','Operations','Deck Maintenance','Deck Machinery','Leaks'];

let state = defaultState();
let master = false, masterTimer = null;
let logoClicks = 0, logoClickTimer = null;
let ui = { search:'', sort:'newest', statusFilter:'All', catFilter:'All', tagFilter:'All', pinnedOnly:false, expanded:new Set() };
let calDate = new Date();
let lightbox = { imgs:[], idx:0 };
let pendingNewAttach = [];
let pendingUpdateAttach = {};

/* ---------- defaults / normalisation ---------- */
function defaultState(){
  return {
    logName:'Optimizations', theme:'dark', font:'mono', fontScale:1, viewMode:'list',
    entries:[], categories:DEFAULT_CATS.slice(), templates:[],
    counter:{}, lastExport:null, noticeDismissed:null,
    deviceId:'dev_'+Math.random().toString(36).slice(2,8), deviceName:'Desktop', dataVersion:1
  };
}
function normalize(raw){
  if(!raw || typeof raw!=='object') raw={};
  const s = {
    logName: raw.logName || 'Optimizations',
    theme: raw.theme || 'dark',
    font: raw.font || 'mono',
    fontScale: typeof raw.fontScale==='number' ? raw.fontScale : 1,
    viewMode: raw.viewMode==='timeline' ? 'timeline' : 'list',
    entries: Array.isArray(raw.entries) ? raw.entries : [],
    categories: Array.isArray(raw.categories) ? raw.categories : DEFAULT_CATS.slice(),
    templates: Array.isArray(raw.templates) ? raw.templates : [],
    counter: raw.counter || {},
    lastExport: raw.lastExport || null,
    noticeDismissed: raw.noticeDismissed || null,
    deviceId: raw.deviceId || ('dev_'+Math.random().toString(36).slice(2,8)),
    deviceName: raw.deviceName || 'Desktop',
    dataVersion: typeof raw.dataVersion==='number' ? raw.dataVersion : 1
  };
  s.entries.forEach(e=>{
    if(!Array.isArray(e.tags)) e.tags = [];
    if(typeof e.pinned !== 'boolean') e.pinned = false;
    if(!e.reminder) e.reminder = null;
    if(!Array.isArray(e.updates)) e.updates = [];
    if(!Array.isArray(e.attachments)) e.attachments = [];
    // sync migration: stable id already exists; add modified + deleted
    if(typeof e.modified !== 'number') e.modified = e.createdMs || Date.now();
    if(typeof e.deleted !== 'boolean') e.deleted = false;
  });
  return s;
}

/* ---------- IndexedDB layer ---------- */
let _db = null;
function openDB(){
  return new Promise((resolve,reject)=>{
    if(_db) return resolve(_db);
    const req = indexedDB.open(DB_NAME, 1);
    req.onupgradeneeded = ()=>{ const db=req.result; if(!db.objectStoreNames.contains(DB_STORE)) db.createObjectStore(DB_STORE); };
    req.onsuccess = ()=>{ _db=req.result; resolve(_db); };
    req.onerror = ()=>reject(req.error);
  });
}
function dbGet(key){
  return DESK_READY.then(up=>{
    if(up)return DESK.kv_get(SUITE_NS,String(key)).then(v=>v==null?undefined:JSON.parse(v));
    return openDB().then(db=>new Promise((resolve,reject)=>{
      const tx=db.transaction(DB_STORE,'readonly');
      const rq=tx.objectStore(DB_STORE).get(key);
      rq.onsuccess=()=>resolve(rq.result);
      rq.onerror=()=>reject(rq.error);
    }));
  });
}
function dbPut(key,val){
  return DESK_READY.then(up=>{
    if(up)return DESK.kv_set(SUITE_NS,String(key),JSON.stringify(val===undefined?null:val)).then(r=>{if(!(r&&r.ok))throw new Error((r&&r.error)||'disk write failed');return true;});
    return openDB().then(db=>new Promise((resolve,reject)=>{
      const tx=db.transaction(DB_STORE,'readwrite');
      tx.objectStore(DB_STORE).put(val,key);
      tx.oncomplete=()=>resolve(true);
      tx.onerror=()=>reject(tx.error);
      tx.onabort=()=>reject(tx.error||new Error('aborted'));
    }));
  });
}

/* ---------- save (sync-looking, async under the hood) ----------
   Returns false synchronously only for serialisable data errors; the
   actual write is queued. Quota problems surface via an async warning. */
let _writeChain = Promise.resolve();
let _writeError = false;
function save(){
  // validate serialisable
  let snapshot;
  try { snapshot = JSON.parse(JSON.stringify(state)); }
  catch(e){ toast('Could not save (data error)'); return false; }
  // queue the write so rapid saves don't race; last write wins
  _writeChain = _writeChain.then(()=>dbPut(DB_KEY, snapshot)).then(()=>{
    refreshStorageEstimate();
  }).catch(err=>{
    if(!_writeError){
      _writeError = true;
      alert('Could not save to the browser database.\n\nYour device may be out of space or blocking storage (e.g. private-browsing limits). Export a JSON backup to be safe. Error: '+(err && err.name||err));
      setTimeout(()=>{_writeError=false;}, 1500);
    }
  });
  return true;
}

/* ---------- storage estimate (async, cached) ---------- */
let _estimate = { usage:0, quota: 250*1024*1024 }; // sensible default until measured
function refreshStorageEstimate(){
  if(navigator.storage && navigator.storage.estimate){
    navigator.storage.estimate().then(est=>{
      _estimate.usage = est.usage || 0;
      _estimate.quota = est.quota || _estimate.quota;
      // refresh the on-screen chip/meter if visible
      const chip=document.querySelector('.storage-chip'); if(chip) updateStorageUI();
    }).catch(()=>{});
  }
}
function storageInfo(){
  const usage=_estimate.usage, quota=_estimate.quota||1;
  const pct=Math.min(1, usage/quota);
  return {
    used:usage,
    usedMB:(usage/1048576).toFixed(usage<10485760?2:1),
    budgetMB:(quota/1048576).toFixed(0),
    pct,
    near: pct >= 0.85
  };
}
function updateStorageUI(){
  const si=storageInfo(), pct=Math.round(si.pct*100);
  document.querySelectorAll('.storage-chip').forEach(chip=>{
    chip.classList.toggle('near', si.near);
    const f=chip.querySelector('.sc-fill'); if(f) f.style.width=Math.max(3,pct)+'%';
    const t=chip.querySelector('.sc-txt'); if(t) t.textContent=pct+'%';
    chip.title=`Storage ${si.usedMB} of ~${si.budgetMB} MB used — tap for details`;
  });
}

/* ---------- helpers ---------- */
function nextId(){

const STATUS_COLOR = {'Open':'var(--open)','In Progress':'var(--progress)','Closed':'var(--closed)','Just a Log':'var(--log)'};

function esc(s){ return (s==null?'':String(s)).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function toast(msg){

/* ---------- appearance: themes, fonts, size ---------- */
const THEMES = [

const SCALE_MIN=0.85, SCALE_MAX=1.4, SCALE_STEP=0.05;

function themeMeta(id){ const t=THEMES.find(t=>t.id===id); return t?t.meta:'#0e1116'; }
function applyAppearance(){
  const root=document.documentElement;

function bumpScale(dir){ setScale(state.fontScale + dir*SCALE_STEP); }

/* ---------- theme & fullscreen toggles ---------- */
function toggleTheme(){
  // quick rail toggle: flip between a dark and a light theme, remembering last of each
  const cur=THEMES.find(t=>t.id===state.theme);
  if(cur && cur.dark){ state._lastDark=state.theme; state.theme=state._lastLight||'light'; }
  else { state._lastLight=state.theme; state.theme=state._lastDark||'dark'; }

}
function toggleFullscreen(){
  const fsEl = document.fullscreenElement || document.webkitFullscreenElement;

/* ---------- image compression ---------- */
function processFile(file){
  return new Promise(resolve=>{
    if(!file.type.startsWith('image/')){
      const r = new FileReader();
      r.onload = ()=>resolve({ id:uid(), type:'file', name:file.name, mime:file.type, data:r.result });
      r.readAsDataURL(file);
      return;
    }
    const r = new FileReader();
    r.onload = ()=>{
      const img = new Image();
      img.onload = ()=>{
        // One high-quality copy — IndexedDB has room, so favour sharpness for projector/meeting use.
        const maxDim = 2000;            // sharp on large screens
        const targetBytes = 400000;     // ~400 KB target per photo
        let w = img.width, h = img.height;
        if(w>maxDim||h>maxDim){ if(w>h){ h=Math.round(h*maxDim/w); w=maxDim; } else { w=Math.round(w*maxDim/h); h=maxDim; } }
        const c = document.createElement('canvas'); c.width=w; c.height=h;
        const ctx=c.getContext('2d'); ctx.fillStyle='#fff'; ctx.fillRect(0,0,w,h); ctx.drawImage(img,0,0,w,h);
        let q=0.85, comp=c.toDataURL('image/jpeg',q);
        // step quality down only if needed to hit the target size
        while(comp.length>targetBytes && q>0.55){ q-=0.07; comp=c.toDataURL('image/jpeg',q); }
        // if still large, shrink dimensions once and retry
        if(comp.length>targetBytes){
          const c2=document.createElement('canvas'); c2.width=Math.round(w*0.82); c2.height=Math.round(h*0.82);
          const x2=c2.getContext('2d'); x2.fillStyle='#fff'; x2.fillRect(0,0,c2.width,c2.height); x2.drawImage(img,0,0,c2.width,c2.height);
          let q2=0.72, comp2=c2.toDataURL('image/jpeg',q2);
          while(comp2.length>targetBytes && q2>0.5){ q2-=0.07; comp2=c2.toDataURL('image/jpeg',q2); }
          comp=comp2;
        }
        // thumb and full point to the same compressed image — one copy, shown big everywhere
        resolve({ id:uid(), type:'photo', name:file.name, thumb:comp, full:comp });
      };
      img.src = r.result;
    };
    r.readAsDataURL(file);
  });
}

/* ---------- TIMELINE VIEW ----------
   Vertical milestone timeline (pin + stem + big colored date, like the
   infographic style): spine on the left on phones, centered with
   alternating sides on wide screens. Root keeps class "list" so
   renderListOnly() can hot-swap it during live search. */
const MONTHS_S = ['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];
function timelineHTML(){
  let arr = filterSort();
  // timeline is strictly chronological; honour direction only
  const asc = ui.sort==='oldest';
  arr = arr.slice().sort((a,b)=> asc ? a.createdMs-b.createdMs : b.createdMs-a.createdMs);
  if(!arr.length){
    return `<div class="list timeline-empty"><div class="empty"><div class="big">🕘</div><div class="t">Nothing on the timeline</div><div>Entries appear here as milestones</div></div></div>`;
  }
  let html = `<div class="list timeline"><div class="tl-spine"></div>`;
  let lastYear = null, side = 0;
  arr.forEach(e=>{
    const d = new Date(e.createdMs);
    const yr = d.getFullYear();
    if(yr !== lastYear){
      lastYear = yr;
      html += `<div class="tl-year"><span>${yr}</span></div>`;
    }
    const C = STATUS_COLOR[e.status] || 'var(--accent)';
    const photo = (e.attachments||[]).find(a=>a.type==='photo');
    const updCount = e.updates.length, attCount = (e.attachments||[]).length;
    const snippet = (e.description||'').trim();
    html += `
    <div class="tl-item ${side%2 ? 'tl-right':'tl-left'}" data-act="tlOpen" data-id="${e.id}" style="--tlc:${C}">
      <div class="tl-pin"><span class="tl-ring" style="border-color:${C}"></span><span class="tl-dot" style="background:${C}"></span></div>
      <div class="tl-card">
        <div class="tl-date" style="color:${C}">
          <span class="tl-day">${String(d.getDate()).padStart(2,'0')}</span>
          <span class="tl-mon">${MONTHS_S[d.getMonth()]} ${yr}</span>
        </div>
        <div class="tl-title">${e.pinned?'<span class="tl-star">★</span>':''}${esc(e.title)||'(untitled)'}</div>
        <div class="tl-chips">
          <span class="tl-chip" style="color:${C};border-color:${C}">${esc(e.status)}</span>
          <span class="tl-chip dim">${esc(e.category)}</span>
          ${e.priority==='High'?`<span class="tl-chip" style="color:var(--open);border-color:var(--open)">High</span>`:''}
          ${updCount?`<span class="tl-chip dim">↩ ${updCount}</span>`:''}
          ${attCount?`<span class="tl-chip dim">📎 ${attCount}</span>`:''}
        </div>
        ${snippet?`<div class="tl-snip">${esc(snippet)}</div>`:''}
        ${photo?`<img class="tl-thumb" src="${photo.thumb}" alt="">`:''}
      </div>
    </div>`;
    side++;
  });
  html += `</div>`;
  return html;
}

/* Combined follow-up log: the original description becomes the first (oldest) row,
   followed by the real updates in order. */
function combinedLog(e){
  const rows = [];
  if(e.description && e.description.trim()){
    rows.push({ id:'__desc__', ms:e.createdMs, text:e.description, attachments:[], isOrigin:true });
  }
  return rows.concat(e.updates);
}

/* ---------- stats helpers ---------- */
function stats(){
  const s = { total:state.entries.length, Open:0, 'In Progress':0, Closed:0, 'Just a Log':0 };
  liveEntries().forEach(e=> s[e.status]!==undefined && s[e.status]++);
  return s;
}
function liveEntries(){ return state.entries.filter(e=>!e.deleted); }
function statusCounts(){ const c={}; liveEntries().forEach(e=>c[e.status]=(c[e.status]||0)+1); return c; }
function allTags(){ const set=new Set(); liveEntries().forEach(e=>e.tags.forEach(t=>set.add(t))); return [...set].sort(); }

function filterSort(){
  let arr = liveEntries();
  const q = ui.search.trim().toLowerCase();
  if(q){
    arr = arr.filter(e=>{
      const hay = [e.title,e.description,e.category,e.id,...(e.tags||[]),...e.updates.map(u=>u.text)].join(' ').toLowerCase();
      return hay.includes(q);
    });
  }
  if(ui.statusFilter!=='All') arr = arr.filter(e=>e.status===ui.statusFilter);
  if(ui.catFilter!=='All') arr = arr.filter(e=>e.category===ui.catFilter);
  if(ui.pinnedOnly) arr = arr.filter(e=>e.pinned);
  const prioRank = {High:0,Medium:1,Low:2};
  const statRank = {'Open':0,'In Progress':1,'Just a Log':2,'Closed':3};
  arr.sort((a,b)=>{
    switch(ui.sort){
      case 'oldest': return a.createdMs-b.createdMs;
      case 'priority': return prioRank[a.priority]-prioRank[b.priority] || b.createdMs-a.createdMs;
      case 'due': return (a.due||'9999')<(b.due||'9999')?-1:(a.due||'9999')>(b.due||'9999')?1:0;
      case 'status': return statRank[a.status]-statRank[b.status] || b.createdMs-a.createdMs;
      case 'title': return (a.title||'').localeCompare(b.title||'');
      default: return b.createdMs-a.createdMs;
    }
  });
  return arr;
}

function getEntry(id){ return state.entries.find(e=>e.id===id); }
function touch(id){ const e=getEntry(id); if(e){ e.modified=Date.now(); } state.dataVersion=(state.dataVersion||1)+1; }

/* ============ BIND MAIN ============ */
function bindMain(){
  // logo triple-click
  const logo = document.getElementById('logo');
  logo.addEventListener('click', ()=>{
    logoClicks++;
    clearTimeout(logoClickTimer);
    logoClickTimer = setTimeout(()=>logoClicks=0, 600);
    if(logoClicks>=3){ logoClicks=0; toggleMaster(); }
  });
  // search (in popover)
  const search = document.getElementById('search');
  if(search) search.addEventListener('input', e=>{ ui.search=e.target.value; renderListOnly(); });
  // sort options (in popover)
  document.querySelectorAll('[data-sortval]').forEach(b=>b.addEventListener('click',()=>{ ui.sort=b.dataset.sortval; closePopovers(); render(); }));

  // drawer backdrop
  const bd = document.getElementById('drawerBackdrop');
  if(bd) bd.addEventListener('click', closeDrawer);

  document.querySelectorAll('[data-status]').forEach(b=>b.addEventListener('click',()=>{ ui.statusFilter=b.dataset.status; render(); }));
  document.querySelectorAll('[data-cat]').forEach(b=>b.addEventListener('click',()=>{ ui.catFilter=b.dataset.cat; render(); }));

  document.querySelectorAll('[data-act]').forEach(el=>{
    el.addEventListener('click', handleAct);
  });

  // long-press for present
  document.querySelectorAll('.card-head').forEach(ch=>{
    let timer=null, moved=false;
    const start=()=>{ moved=false; timer=setTimeout(()=>{ if(!moved){ if(navigator.vibrate)navigator.vibrate(15); openPresent(ch.dataset.id); } },500); };
    const cancel=()=>clearTimeout(timer);
    ch.addEventListener('touchstart',start,{passive:true});
    ch.addEventListener('touchmove',()=>{moved=true;cancel();},{passive:true});
    ch.addEventListener('touchend',cancel);
    ch.addEventListener('mousedown',start);
    ch.addEventListener('mouseup',cancel);
    ch.addEventListener('mouseleave',cancel);
  });

  // inline edits
  document.querySelectorAll('[data-act="editStatus"]').forEach(s=>s.addEventListener('change',e=>{ getEntry(s.dataset.id).status=e.target.value; touch(s.dataset.id); save(); renderKeepExpanded(); }));
  document.querySelectorAll('[data-act="editPriority"]').forEach(s=>s.addEventListener('change',e=>{ getEntry(s.dataset.id).priority=e.target.value; touch(s.dataset.id); save(); renderKeepExpanded(); }));
  document.querySelectorAll('[data-act="editCategory"]').forEach(s=>s.addEventListener('change',e=>{ getEntry(s.dataset.id).category=e.target.value; touch(s.dataset.id); save(); }));

  // drop zones
  document.querySelectorAll('[data-act="dropEntry"]').forEach(dz=>{
    const id=dz.dataset.id;
    dz.addEventListener('click',()=>pickFiles(files=>addEntryAttach(id,files)));
    dz.addEventListener('dragover',e=>{e.preventDefault();dz.classList.add('over');});
    dz.addEventListener('dragleave',()=>dz.classList.remove('over'));
    dz.addEventListener('drop',e=>{e.preventDefault();dz.classList.remove('over'); addEntryAttach(id,[...e.dataTransfer.files]);});
  });

  document.addEventListener('click', closePopoversOnOutside, true);

  // repopulate any staged (pre-save) update attachments still in memory
  Object.keys(pendingUpdateAttach).forEach(eid=>{
    if(pendingUpdateAttach[eid] && pendingUpdateAttach[eid].length){
      const box=document.getElementById('updAtt_'+eid);
      if(box) renderStaged(box, pendingUpdateAttach[eid]);
    }
  });
}

// Rebind only the elements inside the freshly-swapped list (used by renderListOnly)
function bindListInteractions(){
  const list = document.querySelector('.list');
  if(!list) return;
  list.querySelectorAll('[data-act]').forEach(el=>el.addEventListener('click', handleAct));
  list.querySelectorAll('.card-head').forEach(ch=>{
    let timer=null, moved=false;
    const start=()=>{ moved=false; timer=setTimeout(()=>{ if(!moved){ if(navigator.vibrate)navigator.vibrate(15); openPresent(ch.dataset.id); } },500); };
    const cancel=()=>clearTimeout(timer);
    ch.addEventListener('touchstart',start,{passive:true});
    ch.addEventListener('touchmove',()=>{moved=true;cancel();},{passive:true});
    ch.addEventListener('touchend',cancel);
    ch.addEventListener('mousedown',start);
    ch.addEventListener('mouseup',cancel);
    ch.addEventListener('mouseleave',cancel);
  });
  list.querySelectorAll('[data-act="editStatus"]').forEach(s=>s.addEventListener('change',e=>{ getEntry(s.dataset.id).status=e.target.value; touch(s.dataset.id); save(); renderKeepExpanded(); }));
  list.querySelectorAll('[data-act="editPriority"]').forEach(s=>s.addEventListener('change',e=>{ getEntry(s.dataset.id).priority=e.target.value; touch(s.dataset.id); save(); renderKeepExpanded(); }));
  list.querySelectorAll('[data-act="editCategory"]').forEach(s=>s.addEventListener('change',e=>{ getEntry(s.dataset.id).category=e.target.value; touch(s.dataset.id); save(); }));
  list.querySelectorAll('[data-act="dropEntry"]').forEach(dz=>{
    const id=dz.dataset.id;
    dz.addEventListener('click',()=>pickFiles(files=>addEntryAttach(id,files)));
    dz.addEventListener('dragover',e=>{e.preventDefault();dz.classList.add('over');});
    dz.addEventListener('dragleave',()=>dz.classList.remove('over'));
    dz.addEventListener('drop',e=>{e.preventDefault();dz.classList.remove('over'); addEntryAttach(id,[...e.dataTransfer.files]);});
  });
}

function closePopoversOnOutside(e){
  const inPop = e.target.closest('.rail-pop');
  const isTrigger = e.target.closest('[data-act="railSearch"],[data-act="railSort"]');
  if(!inPop && !isTrigger) closePopovers();
}

function renderListOnly(){
  // update only the entry list so the open search popover keeps focus
  const main = document.querySelector('.main-col');
  if(!main){ render(); return; }
  const oldList = main.querySelector('.list');
  const tmp = document.createElement('div');
  tmp.innerHTML = state.viewMode==='timeline' ? timelineHTML() : listHTML();
  const newList = tmp.firstElementChild;
  if(oldList) oldList.replaceWith(newList); else main.appendChild(newList);
  // rebind list-level interactions
  bindListInteractions();
}
function renderKeepExpanded(){ render(); }

/* ---------- actions ---------- */
function handleAct(e){
  const el = e.currentTarget;
  const act = el.dataset.act;
  const id = el.dataset.id;
  switch(act){
    case 'toggleExpand': if(ui.expanded.has(id))ui.expanded.delete(id); else ui.expanded.add(id); render(); break;
    case 'togglePin': e.stopPropagation(); { const en=getEntry(id); en.pinned=!en.pinned; en.modified=Date.now(); state.dataVersion=(state.dataVersion||1)+1; save(); render(); } break;
    case 'togglePinnedOnly': ui.pinnedOnly=!ui.pinnedOnly; render(); break;
    case 'toggleView': state.viewMode = state.viewMode==='timeline' ? 'list' : 'timeline'; save(); closeDrawer(); render(); break;
    case 'tlOpen': openPresent(id); break;
    case 'saveUpdate': saveUpdate(id); break;
    case 'updAttach': pickFiles(files=>stageUpdateAttach(id,files)); break;
    case 'lightbox': { const en=getEntry(el.dataset.eid); openLightbox(en.attachments.filter(a=>a.type==='photo'), +el.dataset.idx); } break;
    case 'lightboxUpd': { const en=getEntry(el.dataset.eid); const u=en.updates.find(x=>x.id===el.dataset.uid); openLightbox((u.attachments||[]).filter(a=>a.type==='photo'), +el.dataset.idx); } break;
    case 'present': openPresent(id); break;
    case 'printEntry': printEntry(id); break;
    case 'deleteEntry': deleteEntry(id); break;
    case 'newEntry': closeDrawer(); openNewEntry(); break;
    case 'toggleTheme': toggleTheme(); break;
    case 'toggleFullscreen': toggleFullscreen(); break;
    case 'stats': closeDrawer(); openStats(); break;
    case 'calendar': closeDrawer(); openCalendar(); break;
    case 'report': closeDrawer(); openReport(); break;
    case 'settings': closeDrawer(); openSettings(); break;
    case 'rename': renameLog(); break;
    case 'exportJson': exportJson(); break;
    case 'exportCsv': exportCsv(); break;
    case 'import': importData(); break;
    case 'trash': closeModal&&closeModal(); openTrash(); break;
    case 'dismissNotice': state.noticeDismissed='backup'; save(); render(); break;
    case 'toggleDrawer': toggleDrawer(); break;
    case 'railSearch': e.stopPropagation(); openPopover('searchPop', el); break;
    case 'railSort': e.stopPropagation(); openPopover('sortPop', el); break;
    case 'overflowSheet': closeDrawer(); openOverflowSheet(); break;
  }
}

/* Render a staged (pre-save) attachment list with delete + drag-and-drop reorder.
   `arr` is mutated in place; `box` is the container element. */
function renderStaged(box, arr){
  if(!box) return;
  if(!arr || !arr.length){ box.innerHTML=''; return; }
  box.classList.add('staged-grid');
  box.innerHTML = arr.map((a,i)=>{
    const inner = a.type==='photo'
      ? `<img src="${a.thumb}" draggable="false">`
      : `<div class="staged-file" title="${esc(a.name)}">📄<span>${esc(a.name.slice(0,16))}</span></div>`;
    return `<div class="staged-item" draggable="true" data-idx="${i}">
      ${inner}
      <button class="staged-del" data-del="${i}" title="Remove" aria-label="Remove">✕</button>
      <span class="staged-handle" title="Drag to reorder">⋮⋮</span>
    </div>`;
  }).join('');
  // delete
  box.querySelectorAll('[data-del]').forEach(b=>b.onclick=(ev)=>{
    ev.stopPropagation();
    arr.splice(+b.dataset.del,1);
    renderStaged(box, arr);
  });
  // drag-and-drop reorder
  let dragFrom=null;
  box.querySelectorAll('.staged-item').forEach(item=>{
    item.addEventListener('dragstart', e=>{ dragFrom=+item.dataset.idx; item.classList.add('dragging'); e.dataTransfer.effectAllowed='move'; });
    item.addEventListener('dragend', ()=>{ item.classList.remove('dragging'); box.querySelectorAll('.staged-item').forEach(x=>x.classList.remove('drop-target')); });
    item.addEventListener('dragover', e=>{ e.preventDefault(); item.classList.add('drop-target'); });
    item.addEventListener('dragleave', ()=>item.classList.remove('drop-target'));
    item.addEventListener('drop', e=>{
      e.preventDefault();
      const to=+item.dataset.idx;
      if(dragFrom===null || dragFrom===to) return;
      const [moved]=arr.splice(dragFrom,1);
      arr.splice(to,0,moved);
      dragFrom=null;
      renderStaged(box, arr);
    });
  });
  // touch reorder fallback (long-press then drag)
  enableTouchReorder(box, arr);
}

/* Touch-based reorder for mobile: press and move a tile over another to swap order. */
function enableTouchReorder(box, arr){
  let startIdx=null, ghost=null;
  box.querySelectorAll('.staged-item').forEach(item=>{
    const handle = item; // whole tile is draggable on touch
    handle.addEventListener('touchstart', e=>{
      startIdx=+item.dataset.idx;
      item.classList.add('dragging');
    }, {passive:true});
    handle.addEventListener('touchmove', e=>{
      if(startIdx===null) return;
      const t=e.touches[0];
      const el=document.elementFromPoint(t.clientX,t.clientY);
      const over=el && el.closest('.staged-item');
      box.querySelectorAll('.staged-item').forEach(x=>x.classList.remove('drop-target'));
      if(over && over!==item) over.classList.add('drop-target');
    }, {passive:true});
    handle.addEventListener('touchend', e=>{
      if(startIdx===null) return;
      const t=e.changedTouches[0];
      const el=document.elementFromPoint(t.clientX,t.clientY);
      const over=el && el.closest('.staged-item');
      if(over){
        const to=+over.dataset.idx;
        if(to!==startIdx){ const [m]=arr.splice(startIdx,1); arr.splice(to,0,m); }
      }
      startIdx=null;
      renderStaged(box, arr);
    });
  });
}
function saveUpdate(id){
  const ta=document.querySelector(`[data-updfor="${id}"]`);
  const text=ta.value.trim();
  const atts=pendingUpdateAttach[id]||[];
  if(!text && !atts.length){ toast('Write something first'); return; }
  const en=getEntry(id);
  const row={ id:uid(), ms:Date.now(), text:text, attachments:atts };
  en.updates.push(row);
  en.modified=Date.now(); state.dataVersion=(state.dataVersion||1)+1;
  if(save()===false){
    en.updates.pop(); // roll back; keep staged photos so user can retry after freeing space
    render();
    return;
  }
  pendingUpdateAttach[id]=[];
  render();
  toast('Update added');
}

  state.dataVersion=(state.dataVersion||1)+1;
  ui.expanded.delete(id);
  save(); render(); renderTrash&&renderTrash(); toast('Entry moved to Trash');
}

/* ---------- CALENDAR ---------- */
let calStatus='All', calCat='All', calShowUpdates=false;
function openCalendar(){
  openPanel('Calendar', calBodyHTML(), '');

function calBodyHTML(){
  const y=calDate.getFullYear(), m=calDate.getMonth();
  const first=new Date(y,m,1), startDow=first.getDay();
  const daysInMonth=new Date(y,m+1,0).getDate();
  const prevDays=new Date(y,m,0).getDate();
  const cats=['All',...state.categories];
  let cells='';
  const today=new Date(); today.setHours(0,0,0,0);
  for(let i=0;i<42;i++){
    let dayNum, cls='cal-cell', cellDate;
    if(i<startDow){ dayNum=prevDays-startDow+1+i; cls+=' other'; cellDate=new Date(y,m-1,dayNum); }
    else if(i>=startDow+daysInMonth){ dayNum=i-startDow-daysInMonth+1; cls+=' other'; cellDate=new Date(y,m+1,dayNum); }
    else { dayNum=i-startDow+1; cellDate=new Date(y,m,dayNum); }
    if(cellDate.getTime()===today.getTime()) cls+=' today';
    const items=calItemsForDate(cellDate);
    const chips=items.slice(0,3).map(it=>`<span class="cal-chip" style="background:${STATUS_COLOR[it.status]}" data-calid="${it.id}" title="${esc(it.label)}">${esc(it.label)}</span>`).join('');
    const more=items.length>3?`<span class="cal-more">+${items.length-3}</span>`:'';
    cells+=`<div class="${cls}"><span class="cd">${dayNum}</span>${chips}${more}</div>`;
  }
  return `
    <div class="cal-controls">
      <div class="cal-nav">
        <button data-cal="prev">‹</button>
        <span class="cal-month">${MONS[m]} ${y}</span>
        <button data-cal="next">›</button>
      </div>
      <button data-cal="today" style="padding:7px 12px;border-radius:9px;background:var(--bg-card);border:1px solid var(--border);font-size:12px;">Today</button>
    </div>
    <div class="cal-toggle-row">
      <select id="calStatus" class="sort-sel" style="flex:0 0 auto;">
        ${['All','Open','In Progress','Closed','Just a Log'].map(s=>`<option ${calStatus===s?'selected':''}>${s}</option>`).join('')}
      </select>
      <select id="calCat" class="sort-sel" style="flex:0 0 auto;">
        ${cats.map(c=>`<option ${calCat===c?'selected':''}>${esc(c)}</option>`).join('')}
      </select>
      <button class="fbtn ${calShowUpdates?'on':''}" data-cal="updates">Show updates</button>
    </div>
    <div class="cal-grid">
      ${DAYS.map(d=>`<div class="cal-dow">${d}</div>`).join('')}
      ${cells}
    </div>
    <div class="legend" style="margin-top:14px;">
      ${Object.entries(STATUS_COLOR).map(([k,v])=>`<span><span class="cdot" style="background:${v}"></span>${k}</span>`).join('')}
    </div>
    <div class="cal-range">
      <div class="field" style="margin:0;flex:1;"><label>From</label><input type="date" id="rngFrom"></div>
      <div class="field" style="margin:0;flex:1;"><label>To</label><input type="date" id="rngTo"></div>
      <button class="save-btn" style="width:auto;margin:0;padding:11px 16px;" data-cal="rangeReport">⎙ Range report</button>
    </div>`;
}
function calItemsForDate(date){
  const ds=`${date.getFullYear()}-${String(date.getMonth()+1).padStart(2,'0')}-${String(date.getDate()).padStart(2,'0')}`;
  const items=[];
  liveEntries().forEach(e=>{
    if(calStatus!=='All'&&e.status!==calStatus)return;
    if(calCat!=='All'&&e.category!==calCat)return;
    const cd=new Date(e.createdMs); const cds=`${cd.getFullYear()}-${String(cd.getMonth()+1).padStart(2,'0')}-${String(cd.getDate()).padStart(2,'0')}`;
    if(cds===ds) items.push({id:e.id,status:e.status,label:e.title});
    if(calShowUpdates) e.updates.forEach(u=>{ const ud=new Date(u.ms); const uds=`${ud.getFullYear()}-${String(ud.getMonth()+1).padStart(2,'0')}-${String(ud.getDate()).padStart(2,'0')}`; if(uds===ds)items.push({id:e.id,status:e.status,label:'↩ '+e.title}); });
  });
  return items;
}
function bindCalendar(){
  const p=document.getElementById('panel');
  p.querySelectorAll('[data-cal]').forEach(b=>{
    b.onclick=()=>{
      const a=b.dataset.cal;
      if(a==='prev'){ calDate.setMonth(calDate.getMonth()-1); refreshCal(); }
      else if(a==='next'){ calDate.setMonth(calDate.getMonth()+1); refreshCal(); }
      else if(a==='today'){ calDate=new Date(); refreshCal(); }
      else if(a==='updates'){ calShowUpdates=!calShowUpdates; refreshCal(); }
      else if(a==='rangeReport'){ rangeReport(); }
    };
  });
  p.querySelector('#calStatus').onchange=e=>{ calStatus=e.target.value; refreshCal(); };
  p.querySelector('#calCat').onchange=e=>{ calCat=e.target.value; refreshCal(); };
  p.querySelectorAll('[data-calid]').forEach(c=>c.onclick=()=>{ closePanel(); ui.expanded.add(c.dataset.calid); render(); setTimeout(()=>{const card=document.querySelector(`.card[data-id="${c.dataset.calid}"]`); if(card)card.scrollIntoView({behavior:'smooth',block:'center'});},100); });
}
function refreshCal(){
  const p=document.getElementById('panel');
  const from=p.querySelector('#rngFrom')?.value, to=p.querySelector('#rngTo')?.value;
  p.querySelector('.panel-body').innerHTML=calBodyHTML();
  if(from)p.querySelector('#rngFrom').value=from;
  if(to)p.querySelector('#rngTo').value=to;
  bindCalendar();
}
function rangeReport(){
  const p=document.getElementById('panel');
  const from=p.querySelector('#rngFrom').value, to=p.querySelector('#rngTo').value;
  if(!from||!to){ toast('Pick both dates'); return; }
  const fromMs=new Date(from+'T00:00:00').getTime(), toMs=new Date(to+'T23:59:59').getTime();
  const sel=liveEntries().filter(e=>{
    if(calStatus!=='All'&&e.status!==calStatus)return false;
    if(calCat!=='All'&&e.category!==calCat)return false;
    return e.createdMs>=fromMs&&e.createdMs<=toMs;
  });
  if(!sel.length){ toast('No entries in range'); return; }
  buildReport(sel, 'detail', true, `Range: ${fmtDate(from)} – ${fmtDate(to)}`);
}

/* ============ STATISTICS ============ */
function openStats(){
  const e=state.entries;
  const sc=statusCounts();
  const closed=e.filter(x=>x.status==='Closed');
  let avgDays='—';
  if(closed.length){
    const totals=closed.map(x=>{ const last=x.updates.length?x.updates[x.updates.length-1].ms:x.createdMs; return Math.max(0,(last-x.createdMs)/86400000); });
    avgDays=(totals.reduce((a,b)=>a+b,0)/closed.length).toFixed(1);
  }
  // priority breakdown
  const prio={Low:0,Medium:0,High:0}; e.forEach(x=>prio[x.priority]++);
  // category breakdown
  const catB={}; state.categories.forEach(c=>catB[c]=0); e.forEach(x=>{ if(catB[x.category]!==undefined)catB[x.category]++; });
  const maxPrio=Math.max(1,...Object.values(prio));
  const maxCat=Math.max(1,...Object.values(catB));
  // 6-month trend
  const now=new Date(); const months=[];
  for(let i=5;i>=0;i--){ const d=new Date(now.getFullYear(),now.getMonth()-i,1); months.push({y:d.getFullYear(),m:d.getMonth(),created:0,closed:0}); }
  e.forEach(x=>{
    const cd=new Date(x.createdMs);
    months.forEach(mo=>{ if(cd.getFullYear()===mo.y&&cd.getMonth()===mo.m)mo.created++; });
    if(x.status==='Closed'){ const last=x.updates.length?new Date(x.updates[x.updates.length-1].ms):cd; months.forEach(mo=>{ if(last.getFullYear()===mo.y&&last.getMonth()===mo.m)mo.closed++; }); }
  });
  const maxTrend=Math.max(1,...months.map(mo=>Math.max(mo.created,mo.closed)));

  const body=`
    <div class="stat-cards">
      <div class="stat-card"><div class="sv">${e.length}</div><div class="sl">Total entries</div></div>
      <div class="stat-card"><div class="sv" style="color:var(--progress)">${sc['In Progress']||0}</div><div class="sl">In progress</div></div>
      <div class="stat-card"><div class="sv" style="color:var(--closed)">${sc.Closed||0}</div><div class="sl">Closed</div></div>
      <div class="stat-card"><div class="sv">${avgDays}</div><div class="sl">Avg days to close</div></div>
    </div>
    <div class="bar-chart"><h3>By priority</h3>
      ${Object.entries(prio).map(([k,v])=>`<div class="bar-row"><span class="bl">${k}</span><div class="bar-track"><div class="bar-fill" style="width:${v/maxPrio*100}%;background:${PRIO_COLOR[k]}"></div></div><span class="bv">${v}</span></div>`).join('')}
    </div>
    <div class="bar-chart"><h3>By category</h3>
      ${Object.entries(catB).map(([k,v])=>`<div class="bar-row"><span class="bl" title="${esc(k)}">${esc(k)}</span><div class="bar-track"><div class="bar-fill" style="width:${v/maxCat*100}%;background:var(--accent)"></div></div><span class="bv">${v}</span></div>`).join('')}
    </div>
    <div class="bar-chart"><h3>Created vs Closed — last 6 months</h3>
      <div class="legend"><span><span class="cdot" style="background:var(--accent)"></span>Created</span><span><span class="cdot" style="background:var(--closed)"></span>Closed</span></div>
      <div class="trend">
        ${months.map(mo=>`<div class="trend-col"><div class="trend-bars">
          <div class="trend-bar" style="height:${mo.created/maxTrend*100}%;background:var(--accent)" title="Created: ${mo.created}"></div>
          <div class="trend-bar" style="height:${mo.closed/maxTrend*100}%;background:var(--closed)" title="Closed: ${mo.closed}"></div>
        </div><div class="trend-lbl">${MONS[mo.m]}</div></div>`).join('')}
      </div>
    </div>`;
  openPanel('Statistics', body, '');
}
